/* 세그먼트(배편/숙박/투어) 카드 */
function segCard(type,resId,title,table,heads,rowFn){
  const list=DB[table].filter(x=>x.reservation_id===resId);
  return `<div class="card"><div class="card-head"><h3>${title} (${list.length})</h3><button class="btn btn-sm btn-primary" onclick="openSegModal('${type}','${resId}')">${ic('plus','ic')} ${title}추가</button></div>
  <div class="tbl-wrap"><table class="tbl"><thead><tr>${heads.map(h=>`<th class="${h==='판매가'?'num':''}">${h}</th>`).join('')}<th></th></tr></thead>
  <tbody>${list.map(x=>{ const cells=rowFn(x); return `<tr>${cells.map((c,i)=>`<td class="${i===cells.length-1?'num':''}">${c}</td>`).join('')}<td class="num"><button class="btn btn-sm btn-ghost" onclick="openSegModal('${type}','${resId}','${x.id}')">수정</button> <button class="btn btn-sm btn-ghost" style="color:var(--danger)" onclick="delSeg('${type}','${x.id}','${resId}')">삭제</button></td></tr>`;}).join('')||`<tr><td colspan="${heads.length+1}" class="empty">${title} 정보를 추가하세요.</td></tr>`}</tbody></table></div></div>`;
}

const SEG_CFG={
  ferry:{table:'reservation_ferries',title:'배편'},
  lodging:{table:'reservation_lodgings',title:'숙박'},
  tour:{table:'reservation_tours',title:'투어'},
};
function segFields(type,x){
  const statusSel=`<div class="field"><label>상태</label><select id="sg-status">${Object.entries(SEG_STATUS).map(([k,v])=>`<option value="${k}" ${(x?x.status:'checking')===k?'selected':''}>${v}</option>`).join('')}</select></div>`;
  const price=`<div class="form-row"><div class="field"><label>판매가</label><input id="sg-sale" type="number" value="${x?x.sale_price||0:0}"></div><div class="field"><label>원가</label><input id="sg-cost" type="number" value="${x?x.cost_price||0:0}"></div></div>`;
  const memo=`<div class="field mb0"><label>메모</label><input id="sg-memo" value="${x?(x.memo||'').replace(/"/g,'&quot;'):''}"></div>`;
  if(type==='ferry') return `
    <div class="form-row"><div class="field"><label>방향</label><select id="sg-direction"><option value="outbound" ${x&&x.direction==='outbound'?'selected':''}>가는편</option><option value="inbound" ${x&&x.direction==='inbound'?'selected':''}>오는편</option></select></div><div class="field"><label>선사</label><input id="sg-company" value="${x?x.ferry_company||'':''}" placeholder="대저해운"></div></div>
    <div class="form-row"><div class="field"><label>출발항</label><input id="sg-dport" value="${x?x.departure_port||'':''}" placeholder="포항"></div><div class="field"><label>도착항</label><input id="sg-aport" value="${x?x.arrival_port||'':''}" placeholder="울릉(도동)"></div></div>
    <div class="form-row"><div class="field"><label>선박명</label><input id="sg-fname" value="${x?x.ferry_name||'':''}" placeholder="썬플라워2호"></div><div class="field"><label>좌석등급</label><input id="sg-seat" value="${x?x.seat_type||'':''}" placeholder="일반실"></div></div>
    <div class="form-row"><div class="field"><label>출발일시</label><input id="sg-dep" type="datetime-local" value="${x&&x.departure_at?x.departure_at.slice(0,16):''}"></div><div class="field"><label>도착일시</label><input id="sg-arr" type="datetime-local" value="${x&&x.arrival_at?x.arrival_at.slice(0,16):''}"></div></div>
    ${statusSel}${price}${memo}`;
  if(type==='lodging') return `
    <div class="form-row"><div class="field"><label>숙소명</label><input id="sg-lname" value="${x?x.lodging_name||'':''}" placeholder="울릉 오션호텔"></div><div class="field"><label>객실 타입</label><input id="sg-room" value="${x?x.room_type||'':''}" placeholder="디럭스 트윈"></div></div>
    <div class="form-row"><div class="field"><label>객실 수</label><input id="sg-rcount" type="number" value="${x?x.room_count||1:1}"></div><div class="field"><label>조식</label><select id="sg-bf"><option value="1" ${x&&x.breakfast_included?'selected':''}>포함</option><option value="0" ${x&&!x.breakfast_included?'selected':''}>불포함</option></select></div></div>
    <div class="form-row"><div class="field"><label>체크인</label><input id="sg-cin" type="date" value="${x?x.checkin_date||'':''}"></div><div class="field"><label>체크아웃</label><input id="sg-cout" type="date" value="${x?x.checkout_date||'':''}"></div></div>
    ${statusSel}${price}${memo}`;
  return `
    <div class="form-row"><div class="field"><label>투어명</label><input id="sg-tname" value="${x?x.tour_name||'':''}" placeholder="독도 탐방"></div><div class="field"><label>진행일</label><input id="sg-tdate" type="date" value="${x?x.tour_date||'':''}"></div></div>
    <div class="form-row"><div class="field"><label>시간대</label><input id="sg-ttime" value="${x?x.tour_time||'':''}" placeholder="오전"></div><div class="field"><label>인원</label><input id="sg-people" type="number" value="${x?x.people_count||0:0}"></div></div>
    ${statusSel}${price}${memo}`;
}
function openSegModal(type,resId,segId){
  const cfg=SEG_CFG[type]; const x=segId?byId(DB[cfg.table],segId):null;
  openModal(`<div class="modal-head"><h3>${cfg.title} ${x?'수정':'추가'}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">${segFields(type,x)}</div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="saveSeg('${type}','${resId}','${segId||''}')">저장</button></div>`);
}
function v(id){ const e=document.getElementById(id); return e?e.value:''; }
function saveSeg(type,resId,segId){
  const cfg=SEG_CFG[type]; const status=v('sg-status'); const sale=+v('sg-sale')||0; const cost=+v('sg-cost')||0; const memo=v('sg-memo');
  let data;
  if(type==='ferry') data={direction:v('sg-direction'),ferry_company:v('sg-company'),departure_port:v('sg-dport'),arrival_port:v('sg-aport'),ferry_name:v('sg-fname'),seat_type:v('sg-seat'),departure_at:v('sg-dep'),arrival_at:v('sg-arr'),status,sale_price:sale,cost_price:cost,memo};
  else if(type==='lodging') data={lodging_name:v('sg-lname'),room_type:v('sg-room'),room_count:+v('sg-rcount')||1,breakfast_included:v('sg-bf')==='1',checkin_date:v('sg-cin'),checkout_date:v('sg-cout'),status,sale_price:sale,cost_price:cost,memo};
  else data={tour_name:v('sg-tname'),tour_date:v('sg-tdate'),tour_time:v('sg-ttime'),people_count:+v('sg-people')||0,status,sale_price:sale,cost_price:cost,memo};
  if(segId){ const s=byId(DB[cfg.table],segId); const before=SEG_STATUS[s.status]; Object.assign(s,data); if(before!==SEG_STATUS[status]) logChange('reservations',resId,'edit',cfg.title+' '+before,cfg.title+' '+SEG_STATUS[status],cfg.title+' 변경'); toast('수정되었습니다','ok'); }
  else{ DB[cfg.table].push({id:uid(),reservation_id:resId,...data}); logChange('reservations',resId,'create','',cfg.title+' 추가',cfg.title+' 등록'); toast(cfg.title+'이(가) 추가되었습니다','ok'); }
  saveDB(); closeModal(); renderReservationDetail(document.getElementById('content'),resId);
  if(type==='ferry'&&status==='disrupted'){ const rr=resById(resId); if(rr&&rr.status!=='disruption') openDisruptionModal(resId); }
}
/* 배편 결항 → 예약상태/문자 연계 플로우 */
function openDisruptionModal(resId){
  const r=resById(resId);
  openModal(`
    <div class="modal-head"><h3>결항 처리</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body"><div style="font-size:14px;line-height:1.7;">배편이 <b style="color:var(--purple)">결항</b> 상태로 저장되었습니다.<br>예약 <b>${r.reservation_number}</b> (${custName(r.customer_id)})의 상태를 <b>'결항처리'</b>로 변경하고 고객에게 결항 안내 문자를 보낼까요?</div></div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">나중에</button>
      <button class="btn" onclick="applyDisruption('${resId}',false)">상태만 변경</button>
      <button class="btn btn-primary" onclick="applyDisruption('${resId}',true)">상태변경 + 결항 문자</button>
    </div>`,{persist:true});
}
function applyDisruption(resId,withSms){
  const r=resById(resId);
  setResStatus(r,'disruption','배편 결항'); saveDB();
  closeModal(); renderReservationDetail(document.getElementById('content'),resId);
  if(withSms) openSmsModal(r.customer_id,resId,'disruption');
  else toast('결항처리 상태로 변경되었습니다','ok');
}
function delSeg(type,segId,resId){ const cfg=SEG_CFG[type]; confirmDialog(cfg.title+' 삭제','이 '+cfg.title+' 항목을 삭제할까요?',()=>{ DB[cfg.table]=DB[cfg.table].filter(x=>x.id!==segId); logChange('reservations',resId,'edit',cfg.title,'삭제',cfg.title+' 삭제'); saveDB(); renderReservationDetail(document.getElementById('content'),resId); toast('삭제되었습니다','ok'); },'삭제','btn-danger'); }

/* 여행자 */
function openTravelerModal(resId,tid){
  const t=tid?byId(DB.travelers,tid):null;
  openModal(`<div class="modal-head"><h3>여행자 ${t?'수정':'추가'}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-row"><div class="field"><label>이름 <span class="req">*</span></label><input id="tv-name" value="${t?t.name:''}"></div><div class="field"><label>연락처</label><input id="tv-phone" value="${t?t.phone||'':''}" oninput="phoneFmt(this)"></div></div>
      <div class="form-row-3">
        <div class="field"><label>구분</label><select id="tv-type"><option value="adult" ${t&&t.traveler_type==='adult'?'selected':''}>성인</option><option value="child" ${t&&t.traveler_type==='child'?'selected':''}>소아</option><option value="infant" ${t&&t.traveler_type==='infant'?'selected':''}>유아</option></select></div>
        <div class="field"><label>성별</label><select id="tv-gender"><option value="unknown" ${!t||t.gender==='unknown'?'selected':''}>미상</option><option value="male" ${t&&t.gender==='male'?'selected':''}>남</option><option value="female" ${t&&t.gender==='female'?'selected':''}>여</option></select></div>
        <div class="field"><label>생년월일</label><input id="tv-birth" type="date" value="${t?t.birth_date||'':''}"></div>
      </div>
      <div class="field"><label class="check-line"><input type="checkbox" id="tv-rep" ${t&&t.is_representative?'checked':''}> 대표 여행자</label></div>
      <div class="field mb0"><label>특이사항</label><input id="tv-memo" value="${t?(t.memo||'').replace(/"/g,'&quot;'):''}"></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="saveTraveler('${resId}','${tid||''}')">저장</button></div>`);
}
function saveTraveler(resId,tid){
  const name=v('tv-name').trim(); if(!name){ toast('이름을 입력하세요','err'); return; }
  const data={name,phone:v('tv-phone'),traveler_type:v('tv-type'),gender:v('tv-gender'),birth_date:v('tv-birth'),is_representative:document.getElementById('tv-rep').checked,memo:v('tv-memo')};
  if(data.is_representative) DB.travelers.filter(x=>x.reservation_id===resId&&x.id!==tid).forEach(x=>x.is_representative=false);
  if(tid){ Object.assign(byId(DB.travelers,tid),data); toast('수정되었습니다','ok'); }
  else{ DB.travelers.push({id:uid(),reservation_id:resId,...data}); toast('여행자가 추가되었습니다','ok'); }
  saveDB(); closeModal(); renderReservationDetail(document.getElementById('content'),resId);
}
function delTraveler(tid,resId){ DB.travelers=DB.travelers.filter(x=>x.id!==tid); saveDB(); renderReservationDetail(document.getElementById('content'),resId); toast('삭제되었습니다','ok'); }

/* 예약 기본정보 수정 */
function openResEditModal(id){
  const r=resById(id);
  openModal(`<div class="modal-head"><h3>예약 정보 수정</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-row"><div class="field"><label>출발일</label><input id="re-start" type="date" value="${r.travel_start_date}"></div><div class="field"><label>귀가일</label><input id="re-end" type="date" value="${r.travel_end_date}"></div></div>
      <div class="form-row-3"><div class="field"><label>성인</label><input id="re-a" type="number" value="${r.adults}"></div><div class="field"><label>소아</label><input id="re-c" type="number" value="${r.children}"></div><div class="field"><label>유아</label><input id="re-i" type="number" value="${r.infants}"></div></div>
      <div class="form-row"><div class="field"><label>총 판매가</label><input id="re-price" type="number" value="${r.total_price}"></div><div class="field"><label>총 원가</label><input id="re-cost" type="number" value="${r.total_cost}"></div></div>
      <div class="field mb0"><label>예약 메모</label><textarea id="re-memo">${r.memo||''}</textarea></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="saveResEdit('${id}')">저장</button></div>`);
}
function saveResEdit(id){
  const r=resById(id); const ns=v('re-start'),np=+v('re-price')||0;
  if(r.travel_start_date!==ns) logChange('reservations',id,'date_change',r.travel_start_date,ns,'일정 변경');
  if(r.total_price!==np) logChange('reservations',id,'price_change',money(r.total_price),money(np),'금액 변경');
  Object.assign(r,{travel_start_date:ns,travel_end_date:v('re-end'),adults:+v('re-a')||0,children:+v('re-c')||0,infants:+v('re-i')||0,total_price:np,total_cost:+v('re-cost')||0,memo:v('re-memo'),updated_at:nowISO()});
  r.profit=r.total_price-r.total_cost;
  saveDB(); closeModal(); renderReservationDetail(document.getElementById('content'),id); toast('수정되었습니다','ok');
}
</script>
<script>
/* ============================================================
   입금 / 정산
   ============================================================ */
let _payFilter='unpaid';
function renderPayments(el){
  const F=_payFilter;
  const active=DB.reservations.filter(r=>!['cancelled','refunded'].includes(r.status));
  const filters={
    unpaid:{label:'미수금',fn:r=>resBalance(r)>0},
    deposit:{label:'예약금대기',fn:r=>['deposit_requested','review','quote_sent'].includes(r.status)&&resPaid(r.id)===0},
    balance:{label:'잔금대기',fn:r=>resPaid(r.id)>0&&resBalance(r)>0},
    done:{label:'완납',fn:r=>resBalance(r)<=0&&r.total_price>0},
    all:{label:'전체',fn:()=>true},
  };
  let list=active.filter(filters[F].fn).sort((a,b)=>a.travel_start_date.localeCompare(b.travel_start_date));
  const totOut=active.reduce((s,r)=>s+Math.max(0,resBalance(r)),0);
  const totIn=DB.payments.reduce((s,p)=>s+p.amount,0);
  el.innerHTML=`
  <div class="page-head"><div><h1>입금 / 정산</h1><div class="sub">미수금 총 ${won(totOut)} · 누적 입금 ${won(totIn)}</div></div></div>
  <div class="grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px;">
    <div class="stat b-blue"><div class="lbl">총 판매가</div><div class="val" style="font-size:22px;">${money(active.reduce((s,r)=>s+r.total_price,0))}</div></div>
    <div class="stat b-green"><div class="lbl">누적 입금</div><div class="val" style="font-size:22px;">${money(totIn)}</div></div>
    <div class="stat b-red"><div class="lbl">미수금</div><div class="val" style="font-size:22px;">${money(totOut)}</div></div>
    <div class="stat b-warn"><div class="lbl">환불 누계</div><div class="val" style="font-size:22px;">${money(DB.refunds.filter(x=>x.status==='completed').reduce((s,x)=>s+x.amount,0))}</div></div>
  </div>
  <div class="filter-tabs">${Object.entries(filters).map(([k,fv])=>`<div class="filter-tab ${F===k?'active':''}" onclick="_payFilter='${k}';renderPayments(document.getElementById('content'))">${fv.label}<span class="cnt">${active.filter(fv.fn).length}</span></div>`).join('')}</div>
  <div class="card"><div class="tbl-wrap"><table class="tbl">
    <thead><tr><th>예약번호</th><th>고객명</th><th>출발일</th><th>상태</th><th class="num">총금액</th><th class="num">입금액</th><th class="num">미수금</th><th></th></tr></thead>
    <tbody>${list.map(r=>{ const bal=resBalance(r); return `<tr class="clickable" onclick="nav('#/reservations/${r.id}')">
      <td class="name-cell">${r.reservation_number}</td><td>${custName(r.customer_id)}</td><td>${fmtDate(r.travel_start_date)}</td><td>${resBadge(r.status)}</td>
      <td class="num">${money(r.total_price)}</td><td class="num muted">${money(resPaid(r.id))}</td><td class="num" style="color:${bal>0?'var(--danger)':'var(--success)'};font-weight:${bal>0?700:400}">${money(bal)}</td>
      <td class="num" onclick="event.stopPropagation()">${can('payment')&&bal>0?`<button class="btn btn-sm btn-primary" onclick="openPaymentModal('${r.id}')">입금등록</button>`:bal<=0?'<span class="badge b-green">완납</span>':''}</td>
    </tr>`;}).join('')||`<tr><td colspan="8" class="empty">${ic('card')}<div>해당 예약이 없습니다.</div></td></tr>`}</tbody>
  </table></div></div>`;
}

function openPaymentModal(resId,presetType){
  if(!can('payment')){ toast('입금 등록 권한이 없습니다','err'); return; }
  const r=resById(resId); const bal=resBalance(r); const paid=resPaid(resId);
  const suggestType=presetType||(paid===0?'deposit':'balance');
  const suggestAmt=suggestType==='deposit'?(r.quote_id?byId(DB.quotes,r.quote_id)?.deposit_amount:Math.round(r.total_price*0.2)):Math.max(0,bal);
  openModal(`<div class="modal-head"><h3>입금 등록</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div style="background:var(--bg);border-radius:9px;padding:12px 14px;margin-bottom:14px;font-size:13px;">
        <div class="between"><span class="muted">${r.reservation_number} · ${custName(r.customer_id)}</span><span>총 ${won(r.total_price)}</span></div>
        <div class="between mt8"><span class="muted">현재 입금</span><span>${won(paid)}</span></div>
        <div class="between"><span class="muted">미수금</span><b style="color:var(--danger)">${won(bal)}</b></div>
      </div>
      <div class="form-row"><div class="field"><label>입금 구분</label><select id="pm-type">${Object.entries(PAY_TYPE).map(([k,vv])=>`<option value="${k}" ${suggestType===k?'selected':''}>${vv}</option>`).join('')}</select></div>
      <div class="field"><label>입금일</label><input id="pm-date" type="date" value="${todayISO()}"></div></div>
      <div class="form-row"><div class="field"><label>금액 <span class="req">*</span></label><input id="pm-amount" type="number" value="${suggestAmt||''}"></div>
      <div class="field"><label>입금 방법</label><select id="pm-method">${Object.entries(PAY_METHOD).map(([k,vv])=>`<option value="${k}">${vv}</option>`).join('')}</select></div></div>
      <div class="field"><label>입금자명</label><input id="pm-payer" value="${custName(r.customer_id)}"></div>
      <div class="field mb0"><label>메모</label><input id="pm-memo"></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="savePayment('${resId}')">등록</button></div>`);
}
function savePayment(resId){
  const amt=+v('pm-amount')||0; if(amt<=0){ toast('금액을 입력하세요','err'); return; }
  const type=v('pm-type');
  const p={id:uid(),reservation_id:resId,payment_date:v('pm-date'),payer_name:v('pm-payer'),amount:amt,payment_method:v('pm-method'),payment_type:type,memo:v('pm-memo'),created_by:session().id,created_at:nowISO()};
  DB.payments.push(p); logChange('reservations',resId,'payment','',PAY_TYPE[type]+' '+money(amt),'입금 등록');
  saveDB(); closeModal();
  const r=resById(resId); const bal=resBalance(r);
  render();
  // 상태 변경 추천
  if(type==='deposit'&&['deposit_requested','review','quote_sent','deposit_paid'].includes(r.status)) suggestStatus(r,'confirmed','예약금 입금이 확인되었습니다.');
  else if(bal<=0&&['confirmed','balance_requested','deposit_paid'].includes(r.status)) suggestStatus(r,'paid','잔금까지 전액 입금이 확인되었습니다.');
  else toast('입금이 등록되었습니다','ok');
}
function delPayment(pid,resId){
  if(!can('payment')){ toast('권한이 없습니다','err'); return; }
  confirmDialog('입금 삭제','입금 내역을 삭제하면 변경 이력이 남습니다. 삭제할까요?',()=>{ const p=byId(DB.payments,pid); logChange('reservations',resId,'payment',money(p.amount)+' 입금','삭제','입금 삭제(관리자)'); DB.payments=DB.payments.filter(x=>x.id!==pid); saveDB(); renderReservationDetail(document.getElementById('content'),resId); toast('삭제되었습니다','ok'); },'삭제','btn-danger');
}
function openRefundModal(resId){
  const r=resById(resId);
  openModal(`<div class="modal-head"><h3>환불 등록</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-row"><div class="field"><label>환불일</label><input id="rf-date" type="date" value="${todayISO()}"></div><div class="field"><label>금액 <span class="req">*</span></label><input id="rf-amount" type="number" value="${resPaid(resId)}"></div></div>
      <div class="form-row"><div class="field"><label>사유</label><select id="rf-reason"><option value="cancel">취소</option><option value="disruption">결항</option><option value="overpayment">과납</option><option value="etc">기타</option></select></div>
      <div class="field"><label>상태</label><select id="rf-status"><option value="requested">요청</option><option value="processing">처리중</option><option value="completed">완료</option></select></div></div>
      <div class="field mb0"><label>메모</label><input id="rf-memo"></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-danger" onclick="saveRefund('${resId}')">환불 등록</button></div>`);
}
function saveRefund(resId){
  const amt=+v('rf-amount')||0; if(amt<=0){ toast('금액을 입력하세요','err'); return; }
  const st=v('rf-status');
  DB.refunds.push({id:uid(),reservation_id:resId,refund_date:v('rf-date'),amount:amt,reason:v('rf-reason'),status:st,memo:v('rf-memo'),created_by:session().id,created_at:nowISO()});
  logChange('reservations',resId,'refund','',money(amt)+' 환불('+st+')','환불 등록');
  const r=resById(resId); if(st==='completed') setResStatus(r,'refunded','환불 완료'); else setResStatus(r,'refunding','환불 진행');
  saveDB(); closeModal(); renderReservationDetail(document.getElementById('content'),resId); toast('환불이 등록되었습니다','ok');
}
</script>
<script>
/* ============================================================
   문자 발송
   ============================================================ */
function fillTemplate(content,cust,res,extra){
  extra=extra||{};
  const q=res&&res.quote_id?byId(DB.quotes,res.quote_id):null;
  const fer=res?DB.reservation_ferries.filter(f=>f.reservation_id===res.id)[0]:null;
  const lod=res?DB.reservation_lodgings.filter(f=>f.reservation_id===res.id)[0]:null;
  const map={
    '고객명':cust?cust.name:'', '담당자':cust?userName(cust.assigned_user_id):session().name,
    '출발일':res?fmtDate(res.travel_start_date):(extra.출발일||''), '귀가일':res?fmtDate(res.travel_end_date):'',
    '인원':res?(res.adults+res.children+res.infants)+'명':'', '예약번호':res?res.reservation_number:'',
    '총금액':res?won(res.total_price):'', '예약금':q?won(q.deposit_amount):(res?won(Math.round(res.total_price*0.2)):''),
    '잔금':res?won(resBalance(res)):'', '입금계좌':DB.settings.bank_account,
    '견적서링크':extra.견적서링크||'', '예약정보링크':extra.예약정보링크||'',
    '배편명':fer?fer.ferry_name:'', '출발항':fer?fer.departure_port:'', '출발시간':fer?fmtDateTime(fer.departure_at):'', '숙소명':lod?lod.lodging_name:'',
  };
  return content.replace(/\{([^}]+)\}/g,(m,k)=>map[k]!==undefined?map[k]:m);
}
function openSmsModal(custId,resId,presetType,quoteId){
  const cust=custById(custId); const res=resId?resById(resId):null;
  const extra={};
  if(quoteId) extra.견적서링크=location.origin+location.pathname+'#/preview/'+quoteId;
  const tmpls=DB.sms_templates.filter(t=>t.is_active);
  const defTpl=presetType?tmpls.find(t=>t.template_type===presetType):tmpls[0];
  openModal(`<div class="modal-head"><h3>문자 발송</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="field"><label>수신자</label><input value="${cust.name} · ${cust.phone}" disabled></div>
      <div class="field"><label>템플릿</label><select id="sm-tpl" onchange="smsPreview('${custId}',${resId?`'${resId}'`:'null'},${quoteId?`'${quoteId}'`:'null'})">${tmpls.map(t=>`<option value="${t.id}" ${defTpl&&defTpl.id===t.id?'selected':''}>${t.title}</option>`).join('')}</select></div>
      <div class="field"><label>내용 (편집 가능)</label><textarea id="sm-content" style="min-height:110px" oninput="document.getElementById('sm-live').textContent=this.value"></textarea></div>
      <div class="field mb0"><label>미리보기</label><div id="sm-live" style="background:var(--blue-bg);border:1px solid var(--blue-soft);border-radius:9px;padding:12px;font-size:13px;white-space:pre-wrap;min-height:40px"></div></div>
    </div>
    <div class="modal-foot"><a class="btn" id="sm-native" href="#" style="margin-right:auto">문자앱으로 열기</a><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="sendSms('${custId}',${resId?`'${resId}'`:'null'})">발송 기록</button></div>`);
  smsPreview(custId,resId,quoteId);
}
function smsPreview(custId,resId,quoteId){
  const tpl=byId(DB.sms_templates,v('sm-tpl')); const cust=custById(custId); const res=resId?resById(resId):null;
  const extra={}; if(quoteId) extra.견적서링크=location.origin+location.pathname+'#/preview/'+quoteId;
  const filled=fillTemplate(tpl.content,cust,res,extra);
  document.getElementById('sm-content').value=filled;
  document.getElementById('sm-live').textContent=filled;
  const a=document.getElementById('sm-native'); if(a) a.href='sms:'+cust.phone+'?body='+encodeURIComponent(filled);
}
function sendSms(custId,resId){
  const cust=custById(custId); const tpl=byId(DB.sms_templates,v('sm-tpl')); const msg=v('sm-content');
  DB.sms_logs.unshift({id:uid(),customer_id:custId,reservation_id:resId||null,template_id:tpl.id,phone:cust.phone,message:msg,status:'sent',provider_message_id:'MSG-'+uid().slice(0,6),sent_by:session().id,sent_at:nowISO()});
  // 상태 추천: 견적 발송 시
  if(resId&&tpl.template_type==='quote'){ const r=resById(resId); if(RES_FLOW.indexOf(r.status)<RES_FLOW.indexOf('quote_sent')) setResStatus(r,'quote_sent','견적 문자 발송'); }
  saveDB(); closeModal(); toast('문자 발송이 기록되었습니다','ok'); render();
}

let _smsTab='send';
function renderSms(el){
  el.innerHTML=`
  <div class="page-head"><div><h1>문자</h1><div class="sub">예약 운영 문자만 발송합니다 (광고성 문자 제외).</div></div></div>
  <div class="tabs">
    <div class="tab ${_smsTab==='send'?'active':''}" onclick="_smsTab='send';renderSms(document.getElementById('content'))">문자 발송</div>
    <div class="tab ${_smsTab==='tpl'?'active':''}" onclick="_smsTab='tpl';renderSms(document.getElementById('content'))">템플릿</div>
    <div class="tab ${_smsTab==='log'?'active':''}" onclick="_smsTab='log';renderSms(document.getElementById('content'))">발송 이력 (${DB.sms_logs.length})</div>
  </div>
  <div id="sms-body"></div>`;
  const body=document.getElementById('sms-body');
  if(_smsTab==='send'){
    body.innerHTML=`<div class="card card-pad" style="max-width:520px">
      <div class="field"><label>수신 고객 선택</label><select id="ss-cust">${DB.customers.map(c=>`<option value="${c.id}">${c.name} (${c.phone})</option>`).join('')}</select></div>
      <button class="btn btn-primary" onclick="openSmsModal(document.getElementById('ss-cust').value,null)">${ic('message','ic')} 문자 작성</button>
      <div class="divider"></div>
      <div class="muted" style="font-size:13px">예약 상세 또는 고객 상세에서 발송하면 예약번호·금액 등 변수가 자동 채워집니다.</div>
    </div>`;
  } else if(_smsTab==='tpl'){
    body.innerHTML=`<div class="card"><div class="card-head"><h3>문자 템플릿 (${DB.sms_templates.length})</h3><button class="btn btn-sm btn-primary" onclick="openTemplateModal()">${ic('plus','ic')} 템플릿추가</button></div>
    ${DB.sms_templates.map(t=>`<div style="padding:14px 18px;border-bottom:1px solid var(--border)"><div class="between"><div class="wrap-flex"><b>${t.title}</b> <span class="chip">${TEMPLATE_TYPES[t.template_type]}</span> ${t.is_active?'':'<span class="badge b-gray">미사용</span>'}</div><div><button class="btn btn-sm btn-ghost" onclick="openTemplateModal('${t.id}')">수정</button><button class="btn btn-sm btn-ghost" style="color:var(--danger)" onclick="delTemplate('${t.id}')">삭제</button></div></div><div style="margin-top:8px;font-size:13px;white-space:pre-wrap;color:var(--slate)">${t.content}</div></div>`).join('')}</div>`;
  } else {
    const logs=DB.sms_logs.slice().sort((a,b)=>(b.sent_at||'').localeCompare(a.sent_at||''));
    body.innerHTML=`<div class="card"><div class="tbl-wrap"><table class="tbl"><thead><tr><th>발송일시</th><th>고객</th><th>수신번호</th><th>유형</th><th>내용</th><th>상태</th><th>발송자</th></tr></thead>
    <tbody>${logs.map(l=>`<tr><td class="muted">${fmtDateTime(l.sent_at)}</td><td>${custName(l.customer_id)}</td><td class="muted">${l.phone}</td><td><span class="chip">${TEMPLATE_TYPES[byId(DB.sms_templates,l.template_id)?.template_type]||'-'}</span></td><td style="max-width:320px;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.message}</td><td>${smsStatusBadge(l.status)}</td><td>${userName(l.sent_by)}</td></tr>`).join('')||`<tr><td colspan="7" class="empty">발송 이력이 없습니다.</td></tr>`}</tbody></table></div></div>`;
  }
}
function openTemplateModal(id){
  const t=id?byId(DB.sms_templates,id):null;
  openModal(`<div class="modal-head"><h3>템플릿 ${t?'수정':'추가'}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-row"><div class="field"><label>템플릿명</label><input id="tp-title" value="${t?t.title:''}"></div><div class="field"><label>유형</label><select id="tp-type">${Object.entries(TEMPLATE_TYPES).map(([k,vv])=>`<option value="${k}" ${t&&t.template_type===k?'selected':''}>${vv}</option>`).join('')}</select></div></div>
      <div class="field"><label>내용</label><textarea id="tp-content" style="min-height:120px">${t?t.content:''}</textarea><div class="hint">변수: {고객명} {출발일} {귀가일} {인원} {예약번호} {총금액} {예약금} {잔금} {입금계좌} {담당자} {견적서링크} {예약정보링크} {배편명} {출발항} {출발시간} {숙소명}</div></div>
      <div class="field mb0"><label class="check-line"><input type="checkbox" id="tp-active" ${!t||t.is_active?'checked':''}> 사용</label></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="saveTemplate('${id||''}')">저장</button></div>`);
}
function saveTemplate(id){
  const data={title:v('tp-title').trim(),template_type:v('tp-type'),content:v('tp-content'),is_active:document.getElementById('tp-active').checked};
  if(!data.title){ toast('템플릿명을 입력하세요','err'); return; }
  if(id){ Object.assign(byId(DB.sms_templates,id),data); toast('수정되었습니다','ok'); }
  else{ DB.sms_templates.push({id:uid(),...data}); toast('추가되었습니다','ok'); }
  saveDB(); closeModal(); render();
}
function delTemplate(id){ confirmDialog('템플릿 삭제','이 템플릿을 삭제할까요?',()=>{ DB.sms_templates=DB.sms_templates.filter(t=>t.id!==id); saveDB(); render(); toast('삭제되었습니다','ok'); },'삭제','btn-danger'); }
</script>
<script>
/* ============================================================
   매출분석
   ============================================================ */
let _anaFrom=null,_anaTo=null;
function renderAnalytics(el){
  const now=new Date(todayISO());
  if(!_anaFrom){ _anaFrom=now.toISOString().slice(0,8)+'01'; _anaTo=todayISO(); }
  const inRange=r=>r.travel_start_date>=_anaFrom&&r.travel_start_date<=_anaTo;
  const list=DB.reservations.filter(inRange);
  const valid=list.filter(r=>!['cancelled','refunded'].includes(r.status));
  const revenue=valid.reduce((s,r)=>s+r.total_price,0);
  const cost=valid.reduce((s,r)=>s+r.total_cost,0);
  const paid=DB.payments.filter(p=>{ const r=resById(p.reservation_id); return r&&inRange(r); }).reduce((s,p)=>s+p.amount,0);
  const outstanding=valid.reduce((s,r)=>s+Math.max(0,resBalance(r)),0);
  const refund=DB.refunds.filter(x=>{ const r=resById(x.reservation_id); return r&&inRange(r)&&x.status==='completed'; }).reduce((s,x)=>s+x.amount,0);
  const profit=revenue-cost-refund; const margin=revenue?(profit/revenue*100):0;
  const cancelled=list.filter(r=>['cancelled','refunded'].includes(r.status));

  // 월별
  const months={};
  DB.reservations.forEach(r=>{ const m=r.travel_start_date.slice(0,7); if(!months[m])months[m]={rev:0,cost:0,cnt:0}; if(!['cancelled','refunded'].includes(r.status)){ months[m].rev+=r.total_price; months[m].cost+=r.total_cost; months[m].cnt++; } });
  const mkeys=Object.keys(months).sort().slice(-6);
  const maxRev=Math.max(1,...mkeys.map(m=>months[m].rev));

  el.innerHTML=`
  <div class="page-head"><div><h1>매출분석</h1><div class="sub">출발일 기준 집계</div></div>
    <div class="actions wrap-flex">
      <input type="date" value="${_anaFrom}" onchange="_anaFrom=this.value;renderAnalytics(document.getElementById('content'))" style="height:38px;border:1px solid var(--border);border-radius:9px;padding:0 10px">
      <span class="muted">~</span>
      <input type="date" value="${_anaTo}" onchange="_anaTo=this.value;renderAnalytics(document.getElementById('content'))" style="height:38px;border:1px solid var(--border);border-radius:9px;padding:0 10px">
      <button class="btn" onclick="exportCsv()">${ic('doc','ic')} CSV 다운로드</button>
    </div>
  </div>
  <div class="grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px;">
    <div class="stat b-blue"><div class="lbl">총매출</div><div class="val" style="font-size:23px">${money(revenue)}</div></div>
    <div class="stat b-green"><div class="lbl">입금액</div><div class="val" style="font-size:23px">${money(paid)}</div></div>
    <div class="stat b-red"><div class="lbl">미수금</div><div class="val" style="font-size:23px">${money(outstanding)}</div></div>
    <div class="stat b-teal"><div class="lbl">순이익</div><div class="val" style="font-size:23px">${money(profit)}<small> ${margin.toFixed(1)}%</small></div></div>
  </div>
  <div class="grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px;">
    <div class="stat b-warn"><div class="lbl">총원가</div><div class="val" style="font-size:20px">${money(cost)}</div></div>
    <div class="stat b-purple"><div class="lbl">취소/환불액</div><div class="val" style="font-size:20px">${money(refund)}</div></div>
    <div class="stat b-gray" style="border-top:3px solid var(--border-strong)"><div class="lbl">예약 건수 / 취소</div><div class="val" style="font-size:20px">${valid.length}<small> / ${cancelled.length}건</small></div></div>
  </div>

  <div class="grid" style="grid-template-columns:1fr 1.4fr;">
    <div class="card">
      <div class="card-head"><h3>월별 매출 (최근 6개월)</h3></div>
      <div class="card-pad">${mkeys.length?mkeys.map(m=>`<div style="margin-bottom:12px"><div class="between" style="font-size:12.5px;margin-bottom:4px"><span class="muted">${m}</span><b>${money(months[m].rev)}원 · ${months[m].cnt}건</b></div><div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden"><div style="height:100%;width:${months[m].rev/maxRev*100}%;background:var(--blue);border-radius:4px"></div></div></div>`).join(''):'<div class="empty">데이터가 없습니다.</div>'}</div>
    </div>
    <div class="card">
      <div class="card-head"><h3>예약별 손익표</h3><span class="muted" style="font-size:12px">${valid.length}건</span></div>
      <div class="tbl-wrap"><table class="tbl"><thead><tr><th>예약번호</th><th>고객</th><th class="num">매출</th><th class="num">원가</th><th class="num">이익</th><th class="num">마진율</th></tr></thead>
      <tbody>${valid.sort((a,b)=>resProfit(b)-resProfit(a)).map(r=>{ const pf=resProfit(r); const mg=r.total_price?(pf/r.total_price*100):0; return `<tr class="clickable" onclick="nav('#/reservations/${r.id}')"><td class="name-cell">${r.reservation_number}</td><td>${custName(r.customer_id)}</td><td class="num">${money(r.total_price)}</td><td class="num muted">${money(r.total_cost)}</td><td class="num" style="color:var(--success);font-weight:700">${money(pf)}</td><td class="num">${mg.toFixed(1)}%</td></tr>`;}).join('')||`<tr><td colspan="6" class="empty">해당 기간 예약이 없습니다.</td></tr>`}</tbody>
      ${valid.length?`<tfoot><tr style="background:var(--bg)"><td colspan="2" style="font-weight:700;padding:11px 14px">합계</td><td class="num" style="font-weight:700">${money(revenue)}</td><td class="num" style="font-weight:700">${money(cost)}</td><td class="num" style="font-weight:800;color:var(--success)">${money(revenue-cost)}</td><td class="num">${((revenue-cost)/(revenue||1)*100).toFixed(1)}%</td></tr></tfoot>`:''}
      </table></div>
    </div>
  </div>`;
}

/* 예약별 손익 CSV (엑셀 호환, BOM 포함) */
function exportCsv(){
  const inRange=r=>r.travel_start_date>=_anaFrom&&r.travel_start_date<=_anaTo;
  const rows=[['예약번호','고객명','출발일','귀가일','상태','총판매가','총원가','입금액','미수금','환불액','순이익','마진율(%)']];
  DB.reservations.filter(inRange).sort((a,b)=>a.travel_start_date.localeCompare(b.travel_start_date)).forEach(r=>{
    const pf=resProfit(r);
    rows.push([r.reservation_number,custName(r.customer_id),r.travel_start_date,r.travel_end_date,RES_STATUS[r.status],
      r.total_price,r.total_cost,resPaid(r.id),Math.max(0,resBalance(r)),resRefunded(r.id),pf,
      r.total_price?(pf/r.total_price*100).toFixed(1):'0']);
  });
  const csv=String.fromCharCode(0xFEFF)+rows.map(row=>row.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='굿투어_매출분석_'+_anaFrom+'_'+_anaTo+'.csv'; a.click(); URL.revokeObjectURL(a.href);
  toast('CSV 파일을 다운로드했습니다','ok');
}

/* ============================================================
   설정
   ============================================================ */
let _setTab='users';
function renderSettings(el){
  const admin=session().role==='admin';
  el.innerHTML=`
  <div class="page-head"><div><h1>설정</h1><div class="sub">직원 · 회사정보 · 상품 관리</div></div></div>
  <div class="tabs">
    <div class="tab ${_setTab==='users'?'active':''}" onclick="_setTab='users';renderSettings(document.getElementById('content'))">직원 관리</div>
    <div class="tab ${_setTab==='company'?'active':''}" onclick="_setTab='company';renderSettings(document.getElementById('content'))">회사 정보·문구</div>
    <div class="tab ${_setTab==='products'?'active':''}" onclick="_setTab='products';renderSettings(document.getElementById('content'))">상품 관리</div>
    <div class="tab ${_setTab==='data'?'active':''}" onclick="_setTab='data';renderSettings(document.getElementById('content'))">데이터 관리</div>
  </div>
  <div id="set-body"></div>`;
  const body=document.getElementById('set-body');
  if(_setTab==='users'){
    if(!admin){ body.innerHTML='<div class="card card-pad"><div class="empty">'+ic('gear')+'<div>직원 관리는 관리자만 접근할 수 있습니다.</div></div></div>'; return; }
    body.innerHTML=`<div class="card"><div class="card-head"><h3>직원 계정 (${DB.users.length})</h3><button class="btn btn-sm btn-primary" onclick="openUserModal()">${ic('plus','ic')} 직원추가</button></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>이름</th><th>권한</th><th>연락처</th><th>이메일</th><th>상태</th><th>최근 로그인</th><th></th></tr></thead>
    <tbody>${DB.users.map(u=>`<tr><td class="name-cell">${u.name}</td><td><span class="chip">${ROLES[u.role]}</span></td><td class="muted">${u.phone||'-'}</td><td class="muted">${u.email||'-'}</td><td>${u.is_active?'<span class="badge b-green">활성</span>':'<span class="badge b-gray">비활성</span>'}</td><td class="muted">${u.last_login_at?fmtDateTime(u.last_login_at):'-'}</td><td class="num"><button class="btn btn-sm btn-ghost" onclick="openUserModal('${u.id}')">수정</button> <button class="btn btn-sm btn-ghost" onclick="toggleUser('${u.id}')">${u.is_active?'비활성화':'활성화'}</button></td></tr>`).join('')}</tbody></table></div></div>
    <div class="card card-pad mt16"><h3 style="font-size:14px;margin-bottom:8px">권한 안내</h3><div class="muted" style="font-size:12.5px;line-height:1.8">관리자: 전체 기능·직원관리·설정 / 매니저: 고객·상담·견적·예약·정산 / 상담직원: 고객·상담·견적·예약 / 정산담당: 입금·환불·매출분석 / 조회전용: 조회만 가능</div></div>`;
  }
  else if(_setTab==='company'){
    const s=DB.settings;
    body.innerHTML=`<div class="card card-pad" style="max-width:640px">
      <div class="field"><label>상호</label><input id="st-name" value="${s.company_name}"></div>
      <div class="field"><label>입금 계좌</label><input id="st-bank" value="${s.bank_account}"></div>
      <div class="field"><label>견적서 하단 안내문</label><textarea id="st-footer">${s.quote_footer}</textarea></div>
      <div class="field"><label>개인정보 수집·이용 동의문</label><textarea id="st-privacy">${s.privacy_text}</textarea></div>
      <div class="field"><label>취소·변경 안내문</label><textarea id="st-cancel">${s.cancel_policy}</textarea></div>
      <button class="btn btn-primary" onclick="saveSettings()">저장</button>
    </div>`;
  }
  else if(_setTab==='products'){
    body.innerHTML=`<div class="card"><div class="card-head"><h3>상품 (${DB.products.length})</h3><button class="btn btn-sm btn-primary" onclick="openProductModal()">${ic('plus','ic')} 상품추가</button></div>
    ${DB.products.map(p=>`<div style="padding:14px 18px;border-bottom:1px solid var(--border)"><div class="between"><div class="wrap-flex"><b>${p.name}</b> <span class="chip">${p.duration_nights}박${p.duration_days}일</span> ${p.is_active?'':'<span class="badge b-gray">미사용</span>'}</div><div><span class="muted" style="font-size:13px;margin-right:10px">기본 ${won(p.base_price)}</span><button class="btn btn-sm btn-ghost" onclick="openProductModal('${p.id}')">수정</button></div></div><div class="muted" style="font-size:12.5px;margin-top:6px">포함: ${p.included_text}</div></div>`).join('')||'<div class="empty">등록된 상품이 없습니다.</div>'}</div>`;
  }
  else {
    const size=(localStorage.getItem(KEY)||'').length;
    body.innerHTML=`<div class="card card-pad" style="max-width:680px">
      <h3 style="font-size:15px;margin-bottom:6px;">데이터 백업 · 복원</h3>
      <p class="muted" style="font-size:13px;margin:0 0 14px;line-height:1.7;">모든 데이터는 현재 이 브라우저(localStorage)에 저장됩니다. 현재 데이터 크기 약 <b>${Math.max(1,Math.round(size/1024))}KB</b>.<br>브라우저 초기화·기기 교체에 대비해 주기적으로 JSON 백업을 내려받아 보관하세요.<br>직원 간 실시간 공유·서버 저장은 <b>BACKEND-DESIGN.md</b>(백엔드 설계서)의 2차 계획을 참고하세요.</p>
      <div class="wrap-flex">
        <button class="btn btn-primary" onclick="exportData()">${ic('doc','ic')} JSON 백업 다운로드</button>
        <label class="btn" style="cursor:pointer;">JSON 복원<input type="file" accept=".json,application/json" style="display:none" onchange="importData(this)"></label>
        <button class="btn btn-danger" onclick="doResetData()">데모 데이터로 초기화</button>
      </div>
    </div>`;
  }
}
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='goodtour-erp-backup-'+todayISO().replace(/-/g,'')+'.json'; a.click(); URL.revokeObjectURL(a.href);
  toast('백업 파일을 다운로드했습니다','ok');
}
function importData(input){
  const f=input.files&&input.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.customers||!d.reservations||!d.users) throw new Error('굿투어 ERP 백업 파일이 아닙니다');
      DB=d; saveDB(); toast('데이터가 복원되었습니다','ok'); render();
    }catch(err){ toast('복원 실패: '+err.message,'err'); }
  };
  rd.readAsText(f,'utf-8'); input.value='';
}
function doResetData(){
  confirmDialog('데이터 초기화','모든 데이터를 삭제하고 데모 데이터로 되돌립니다.<br>진행 전 <b>JSON 백업</b>을 받아두는 것을 권장합니다.',()=>{ resetDB(); toast('초기화되었습니다','ok'); render(); },'초기화','btn-danger');
}
function openUserModal(id){
  const u=id?byId(DB.users,id):null;
  openModal(`<div class="modal-head"><h3>직원 ${u?'수정':'추가'}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-row"><div class="field"><label>이름</label><input id="us-name" value="${u?u.name:''}"></div><div class="field"><label>권한</label><select id="us-role">${Object.entries(ROLES).map(([k,vv])=>`<option value="${k}" ${u&&u.role===k?'selected':''}>${vv}</option>`).join('')}</select></div></div>
      <div class="form-row"><div class="field"><label>연락처</label><input id="us-phone" value="${u?u.phone||'':''}" oninput="phoneFmt(this)"></div><div class="field"><label>이메일</label><input id="us-email" value="${u?u.email||'':''}"></div></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="saveUser('${id||''}')">저장</button></div>`);
}
function saveUser(id){
  const data={name:v('us-name').trim(),role:v('us-role'),phone:v('us-phone'),email:v('us-email')};
  if(!data.name){ toast('이름을 입력하세요','err'); return; }
  if(id){ Object.assign(byId(DB.users,id),data); toast('수정되었습니다','ok'); }
  else{ DB.users.push({id:uid(),...data,is_active:true}); toast('직원이 추가되었습니다','ok'); }
  saveDB(); closeModal(); render();
}
function toggleUser(id){ const u=byId(DB.users,id); u.is_active=!u.is_active; saveDB(); render(); toast(u.is_active?'활성화되었습니다':'비활성화되었습니다','ok'); }
function saveSettings(){ Object.assign(DB.settings,{company_name:v('st-name'),bank_account:v('st-bank'),quote_footer:v('st-footer'),privacy_text:v('st-privacy'),cancel_policy:v('st-cancel')}); saveDB(); toast('저장되었습니다','ok'); }
function openProductModal(id){
  const p=id?byId(DB.products,id):null;
  openModal(`<div class="modal-head"><h3>상품 ${p?'수정':'추가'}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="field"><label>상품명</label><input id="pd-name" value="${p?p.name:''}"></div>
      <div class="form-row-3"><div class="field"><label>일수</label><input id="pd-days" type="number" value="${p?p.duration_days:3}"></div><div class="field"><label>박</label><input id="pd-nights" type="number" value="${p?p.duration_nights:2}"></div><div class="field"><label>기본 판매가</label><input id="pd-price" type="number" value="${p?p.base_price:0}"></div></div>
      <div class="field"><label>포함사항</label><textarea id="pd-inc">${p?p.included_text||'':''}</textarea></div>
      <div class="field mb0"><label>불포함사항</label><textarea id="pd-exc">${p?p.excluded_text||'':''}</textarea></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="saveProduct('${id||''}')">저장</button></div>`);
}
function saveProduct(id){
  const data={name:v('pd-name').trim(),duration_days:+v('pd-days')||1,duration_nights:+v('pd-nights')||0,base_price:+v('pd-price')||0,included_text:v('pd-inc'),excluded_text:v('pd-exc')};
  if(!data.name){ toast('상품명을 입력하세요','err'); return; }
  if(id){ Object.assign(byId(DB.products,id),data); toast('수정되었습니다','ok'); }
  else{ DB.products.push({id:uid(),...data,base_cost:Math.round(data.base_price*0.8),itinerary_text:'',is_active:true}); toast('상품이 추가되었습니다','ok'); }
  saveDB(); closeModal(); render();
}
</script>
<script>
/* ============================================================
   고객 모바일 입력폼 (공개)
   ============================================================ */
function renderPublicForm(app,token){
  document.body.style.background='var(--bg)';
  const form=DB.customer_forms.find(f=>f.token===token);
  if(!form){ app.innerHTML=publicMsg('링크를 찾을 수 없습니다','유효하지 않은 링크입니다. 담당자에게 문의해 주세요.'); return; }
  if(form.expires_at&&form.expires_at<nowISO()&&form.status!=='submitted'){ app.innerHTML=publicMsg('링크가 만료되었습니다','유효기간이 지난 링크입니다. 담당자에게 재발송을 요청해 주세요.'); return; }
  if(form.status==='submitted'){ app.innerHTML=publicMsg('이미 제출되었습니다','예약정보가 정상 접수되었습니다. 담당자가 곧 연락드리겠습니다.',true); return; }
  const c=custById(form.customer_id);
  app.innerHTML=`<div class="pub">
    <div style="background:#fff;padding:13px 24px;border-bottom:1px solid var(--border);">${gtLogo(30)}</div>
    <div class="pub-hero"><h1>굿투어 예약정보 입력</h1><p>${DB.settings.company_name} · 울릉도 여행</p></div>
    <div class="pub-body">
      <div class="stepper"><span class="s on">대표자</span>›<span class="s">일정</span>›<span class="s">인원</span>›<span class="s">희망사항</span>›<span class="s">동의</span></div>

      <div class="pub-sec"><h3><span class="n">1</span> 대표 예약자</h3>
        <div class="field"><label>대표 예약자명 <span class="req">*</span></label><input id="pf-name" value="${c?c.name:''}"></div>
        <div class="field mb0"><label>휴대폰 번호 <span class="req">*</span></label><input id="pf-phone" value="${c?c.phone:''}" oninput="phoneFmt(this)"></div>
      </div>
      <div class="pub-sec"><h3><span class="n">2</span> 여행 일정</h3>
        <div class="form-row"><div class="field"><label>희망 출발일 <span class="req">*</span></label><input id="pf-start" type="date"></div><div class="field"><label>희망 귀가일 <span class="req">*</span></label><input id="pf-end" type="date"></div></div>
        <div class="field mb0"><label>희망 출발항</label><select id="pf-port"><option value="">선택 안함</option><option>포항</option><option>후포</option><option>묵호</option><option>강릉</option></select></div>
      </div>
      <div class="pub-sec"><h3><span class="n">3</span> 인원 정보</h3>
        <div class="form-row-3"><div class="field"><label>성인 <span class="req">*</span></label><input id="pf-adults" type="number" min="1" value="2"></div><div class="field"><label>소아</label><input id="pf-children" type="number" min="0" value="0"></div><div class="field"><label>유아</label><input id="pf-infants" type="number" min="0" value="0"></div></div>
        <div class="field mb0"><label class="check-line"><input type="checkbox" id="pf-vehicle"> 차량 선적 희망</label></div>
      </div>
      <div class="pub-sec"><h3><span class="n">4</span> 숙박 · 투어 · 요청</h3>
        <div class="field"><label>숙박 형태</label><select id="pf-lodging"><option value="">선택 안함</option><option>호텔</option><option>펜션</option><option>모텔</option><option>민박</option><option>리조트</option></select></div>
        <div class="field"><label>희망 투어</label><input id="pf-tour" placeholder="독도, 성인봉 등"></div>
        <div class="field mb0"><label>요청사항</label><textarea id="pf-memo" placeholder="기타 요청사항을 입력해 주세요"></textarea></div>
      </div>
      <div class="pub-sec"><h3><span class="n">5</span> 개인정보 수집 및 이용 동의 <span class="req">*</span></h3>
        <div class="agree-box">${DB.settings.privacy_text}</div>
        <label class="check-line"><input type="checkbox" id="pf-agree"> 위 내용에 동의합니다.</label>
      </div>
      <button class="btn btn-primary" style="width:100%;height:50px;font-size:16px;margin-top:6px" onclick="submitPublicForm('${token}')">제출하기</button>
      <div style="text-align:center;color:var(--faint);font-size:12px;margin-top:14px">문의: ${c?userName(c.assigned_user_id):''} 담당자</div>
    </div>
  </div>`;
}
function publicMsg(title,msg,ok){
  return `<div class="pub"><div style="background:#fff;padding:13px 24px;border-bottom:1px solid var(--border);">${gtLogo(30)}</div><div class="pub-hero" style="background:${ok?'var(--success)':'var(--blue)'}"><h1>${title}</h1></div><div class="pub-body"><div class="pub-sec" style="text-align:center;padding:36px 18px"><div style="font-size:40px;margin-bottom:12px">${ok?'✓':'!'}</div><p style="color:var(--muted);line-height:1.6">${msg}</p></div></div></div>`;
}
function submitPublicForm(token){
  const form=DB.customer_forms.find(f=>f.token===token);
  const name=v('pf-name').trim(), phone=v('pf-phone').trim();
  if(!name){ toast('대표 예약자명을 입력하세요','err'); return; }
  if(!phone||phone.replace(/[^0-9]/g,'').length<10){ toast('휴대폰 번호를 확인하세요','err'); return; }
  if(!v('pf-start')||!v('pf-end')){ toast('여행 일정을 입력하세요','err'); return; }
  if((+v('pf-adults')||0)<1){ toast('성인 인원을 입력하세요','err'); return; }
  if(!document.getElementById('pf-agree').checked){ toast('개인정보 수집·이용에 동의해 주세요','err'); return; }
  Object.assign(form,{ status:'submitted', submitted_at:nowISO(),
    representative_name:name, representative_phone:phone,
    travel_start_date:v('pf-start'), travel_end_date:v('pf-end'),
    adults:+v('pf-adults')||0, children:+v('pf-children')||0, infants:+v('pf-infants')||0,
    departure_port:v('pf-port'), vehicle_shipping:document.getElementById('pf-vehicle').checked,
    lodging_preference:v('pf-lodging'), tour_preferences:v('pf-tour'), request_memo:v('pf-memo'),
    privacy_agreed_at:nowISO() });
  const c=custById(form.customer_id);
  if(c&&!c.privacy_agreed_at) c.privacy_agreed_at=nowISO();
  // 담당자 대시보드 알림용 상담 생성 (정보입력완료)
  DB.consultations.unshift({ id:uid(), customer_id:form.customer_id, user_id:c?c.assigned_user_id:session().id,
    channel:'etc', status:'quote_needed', content:'[고객 입력폼 제출] '+name+' · '+fmtDate(form.travel_start_date)+'~'+fmtDate(form.travel_end_date)+' · 성인 '+form.adults+'명'+(form.tour_preferences?' · 희망투어: '+form.tour_preferences:''),
    customer_request:form.request_memo||'', next_action:'입력정보 확인 후 견적', next_contact_at:todayISO()+'T10:00', priority:'important', created_at:nowISO() });
  // 연결 예약이 있으면 정보입력완료로
  const linked=DB.reservations.filter(r=>r.customer_id===form.customer_id&&['inquiry'].includes(r.status))[0];
  if(linked) setResStatus(linked,'info_completed','고객 입력폼 제출');
  saveDB();
  document.getElementById('app').innerHTML=publicMsg('제출 완료','예약정보가 정상 접수되었습니다.\\n담당자가 확인 후 곧 연락드리겠습니다.',true);
}

/* ============================================================
   부팅
   ============================================================ */
boot();
</script>
</body>
</html>
