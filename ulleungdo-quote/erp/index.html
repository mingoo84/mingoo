<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>굿투어 ERP</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --blue:#1B68FA; --blue-dark:#1550cc; --blue-soft:#E8F0FE; --blue-bg:#F3F7FF;
  --teal:#0F766E;
  --bg:#F6F8FB; --surface:#FFFFFF;
  --ink:#111827; --muted:#6B7280; --faint:#9CA3AF;
  --border:#E5E7EB; --border-strong:#D1D5DB;
  --success:#16A34A; --success-bg:#EAF7EE;
  --warning:#F59E0B; --warning-bg:#FEF6E7;
  --danger:#DC2626; --danger-bg:#FDECEC;
  --purple:#7C3AED; --purple-bg:#F3EEFE;
  --radius:12px; --radius-sm:8px;
  --shadow:0 1px 2px rgba(16,24,40,.06);
  --shadow-md:0 4px 16px rgba(16,24,40,.10);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
  font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:14px;}
h1,h2,h3,h4{margin:0;font-weight:700;letter-spacing:-.2px;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:#d7dbe2;border-radius:6px;border:2px solid var(--bg);}
/* icon base: stroke line-icons everywhere */
svg.ic{width:16px;height:16px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;vertical-align:-2px;}
.stat .lbl svg.ic{width:15px;height:15px;opacity:.75;}
/* 예약 캘린더 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cal-dow{font-size:11px;font-weight:700;color:var(--faint);text-align:center;padding:2px 0 6px;}
.cal-cell{min-height:56px;border:1px solid var(--border);border-radius:8px;padding:6px 7px;position:relative;background:#fff;}
.cal-cell.off{border:none;background:transparent;}
.cal-cell .d{font-size:12px;font-weight:600;color:var(--muted);}
.cal-cell.today{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-soft);}
.cal-cell.today .d{color:var(--blue);font-weight:800;}
.cal-cell.has{background:var(--blue-bg);cursor:pointer;}
.cal-cell.has:hover{border-color:var(--blue);}
.cal-dep{position:absolute;left:6px;bottom:6px;background:var(--blue);color:#fff;font-size:10px;font-weight:700;border-radius:9px;padding:1px 6px;}
.cal-ret{position:absolute;right:7px;bottom:8px;width:7px;height:7px;border-radius:50%;background:var(--teal);}
@media(max-width:860px){.cal-cell{min-height:44px;padding:4px 5px;}.cal-dep{font-size:9px;padding:0 4px;}}

/* ===== App shell ===== */
.app{display:flex;min-height:100vh;}
.sidebar{
  width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
}
.sb-logo{padding:16px 18px 13px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border);}
.sb-nav{flex:1;overflow-y:auto;padding:12px 12px 16px;background:#F2F4F8;}
.sb-group{font-size:11px;font-weight:700;color:var(--faint);padding:14px 8px 6px;letter-spacing:.4px;}
.sb-nav .sb-group:first-child{padding-top:2px;}
.sb-section{
  background:#fff;border:1px solid var(--border);border-radius:12px;padding:6px;
  box-shadow:0 1px 2px rgba(16,24,40,.06),0 8px 16px -12px rgba(16,24,40,.18);
  margin-bottom:12px;
}
/* 대시보드 카드: 옅은 블루 그라데이션 (단독 항목) */
.sb-section.tone-blue{background:linear-gradient(180deg,#E9F1FF 0%,#F9FBFF 100%);border-color:#D8E6FF;}
/* 고객·회계·관리: 헤더 줄에만 파스텔 톤, 아래 하위 메뉴는 흰색 유지 */
.sb-section.tone-teal .sb-head{background:linear-gradient(180deg,#D6F4E8,#E6FAF3);border-bottom-color:#CDEFE2;}
.sb-section.tone-amber .sb-head{background:linear-gradient(180deg,#FBE8CB,#FEF3E2);border-bottom-color:#F5E2C1;}
.sb-section.tone-violet .sb-head{background:linear-gradient(180deg,#E5D9FB,#F0EAFD);border-bottom-color:#E2D6FB;}
.sb-head{
  display:flex;align-items:center;gap:10px;padding:10px 13px;margin:-6px -6px 6px;
  border-bottom:1px solid var(--border);border-radius:11px 11px 0 0;
  font-weight:800;font-size:13.5px;color:var(--ink);
  background:linear-gradient(180deg,#FBFCFE,#F4F6FA);
}
.sb-head{transition:background .16s ease,color .16s ease,transform .16s ease;}
.sb-head span{display:inline-block;transform-origin:left center;transition:transform .16s ease;}
.sb-head .ic{width:18px;height:18px;stroke-width:2;transition:transform .16s ease;}
.sb-head:hover{color:var(--blue-dark);transform:translateX(3px);}
.sb-head:hover span{transform:scale(1.07);}
.sb-head:hover .ic{transform:scale(1.15);}
.sb-head.active{color:var(--blue-dark);background:var(--blue-bg);box-shadow:inset 3px 0 0 var(--blue);}
.sb-item{
  display:flex;align-items:center;gap:10px;padding:7px 11px;min-height:38px;border-radius:8px;color:var(--muted);
  font-weight:600;font-size:13.5px;margin-bottom:1px;position:relative;
  transition:background .16s ease,color .16s ease,transform .16s ease;
}
.sb-item span:not(.badge-n):not(.sb-tail){display:inline-block;transform-origin:left center;transition:transform .16s ease;}
.sb-item .ic{transition:transform .16s ease;}
.sb-item:last-child{margin-bottom:0;}
.sb-item:hover{background:var(--bg);color:var(--ink);transform:translateX(3px);}
.sb-item:hover span:not(.badge-n){transform:scale(1.07);}
.sb-item:hover .ic{transform:scale(1.15);}
.sb-item:active{transform:translateX(3px) scale(.98);}
.sb-item.active{background:var(--blue-soft);color:var(--blue-dark);box-shadow:inset 3px 0 0 var(--blue);}
/* 접이식(아코디언) 하위 메뉴 */
.sb-toggle{width:100%;border:none;background:transparent;cursor:pointer;font-family:inherit;text-align:left;}
.sb-toggle.pactive{color:var(--blue-dark);}
.sb-tail{margin-left:auto;display:flex;align-items:center;gap:6px;}
.sb-tail .chev{flex:none;}
.sb-tail .badge-n{margin-left:0;flex:none;}
.sb-toggle .chev{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s ease;opacity:.7;}
.sb-parent.open .sb-toggle .chev{transform:rotate(90deg);}
.sb-toggle:hover span:not(.sb-tail){transform:none;} /* 부모는 텍스트 확대 생략(칩·화살표 정렬 유지) */
.sb-sub{overflow:hidden;max-height:0;transition:max-height .24s ease;}
.sb-parent.open .sb-sub{max-height:160px;}
.sb-child{padding-left:14px;}
.sb-child .cdot{width:5px;height:5px;border-radius:50%;background:var(--stone);flex-shrink:0;transition:background .16s ease,transform .16s ease;}
.sb-child:hover .cdot{background:var(--blue);}
.sb-child.active .cdot{background:var(--blue);transform:scale(1.3);}
/* 녹취 활용 가이드 */
.guide-step{padding:9px 0;border-bottom:1px dashed var(--border);}
.guide-step:last-of-type{border-bottom:none;}
.guide-step b{color:var(--ink);}
.guide-warn{margin-top:10px;background:var(--warn-bg,#FFFAEB);border:1px solid #FDE8B5;border-radius:9px;padding:10px 12px;font-size:12.5px;line-height:1.7;color:var(--warn-text,#B54708);}
.sb-item .ic{width:18px;height:18px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.9;}
.sb-item .badge-n{margin-left:auto;background:var(--danger);color:#fff;font-size:10.5px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
.sb-user{border-top:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px;}
.sb-user .av{width:32px;height:32px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.sb-user .nm{font-weight:700;font-size:13px;}
.sb-user .rl{font-size:11px;color:var(--faint);}
.sb-user .out{margin-left:auto;color:var(--faint);font-size:12px;font-weight:600;}
.sb-user .out:hover{color:var(--danger);}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  height:60px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:0 24px;position:sticky;top:0;z-index:40;
}
.search{flex:1;max-width:480px;position:relative;}
.search input{
  width:100%;height:38px;border:1px solid var(--border);border-radius:9px;background:var(--bg);
  padding:0 12px 0 38px;outline:none;
}
.search input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px var(--blue-soft);}
.search .si{position:absolute;left:12px;top:10px;width:18px;height:18px;stroke:var(--faint);fill:none;stroke-width:2;}
.search-results{position:absolute;top:44px;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-md);z-index:50;overflow:hidden;max-height:360px;overflow-y:auto;}
.search-results a{display:block;padding:10px 14px;border-bottom:1px solid var(--border);}
.search-results a:last-child{border-bottom:none;}
.search-results a:hover{background:var(--bg);}
.search-results .t{font-weight:600;}
.search-results .s{font-size:12px;color:var(--muted);}
.topbar .tb-actions{margin-left:auto;display:flex;align-items:center;gap:10px;}
.content{padding:24px;max-width:1360px;width:100%;margin:0 auto;}

/* ===== Page header ===== */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap;}
.page-head h1{font-size:22px;}
.page-head .sub{color:var(--muted);font-size:13px;margin-top:3px;}
.page-head .actions{display:flex;gap:8px;}

/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;gap:6px;height:38px;padding:0 15px;border-radius:9px;border:1px solid var(--border);background:#fff;color:var(--ink);font-weight:600;font-size:13.5px;white-space:nowrap;}
.btn:hover{background:var(--bg);}
.btn .ic{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn-primary:hover{background:var(--blue-dark);}
.btn-teal{background:var(--teal);border-color:var(--teal);color:#fff;}
.btn-teal:hover{filter:brightness(.94);}
.btn-danger{background:#fff;border-color:var(--danger);color:var(--danger);}
.btn-danger:hover{background:var(--danger-bg);}
.btn-sm{height:32px;padding:0 11px;font-size:12.5px;border-radius:7px;}
.btn-ghost{border-color:transparent;background:transparent;color:var(--muted);}
.btn-ghost:hover{background:var(--bg);color:var(--ink);}

/* ===== Cards ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.card-pad{padding:18px;}
.card-head{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-head h3{font-size:15px;}
.card-head .link{font-size:12.5px;color:var(--blue);font-weight:600;}
.grid{display:grid;gap:16px;}

/* Stat cards */
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.stat .lbl{font-size:12.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px;}
.stat .val{font-size:28px;font-weight:800;margin-top:8px;letter-spacing:-.5px;}
.stat .val small{font-size:14px;font-weight:600;color:var(--muted);margin-left:2px;}
.stat .dot{width:9px;height:9px;border-radius:50%;}
.stat.b-blue{border-top:3px solid var(--blue);}
.stat.b-teal{border-top:3px solid var(--teal);}
.stat.b-warn{border-top:3px solid var(--warning);}
.stat.b-purple{border-top:3px solid var(--purple);}
.stat.b-green{border-top:3px solid var(--success);}
.stat.b-red{border-top:3px solid var(--danger);}

/* ===== Table ===== */
.tbl-wrap{overflow-x:auto;}
table.tbl{width:100%;border-collapse:collapse;font-size:13.5px;}
table.tbl th{
  text-align:left;font-weight:600;color:var(--muted);font-size:12.5px;padding:11px 14px;
  border-bottom:1px solid var(--border);background:var(--surface);white-space:nowrap;
}
table.tbl td{padding:12px 14px;border-bottom:1px solid var(--border);height:52px;vertical-align:middle;}
table.tbl tbody tr:last-child td,table.tbl tr:last-child td{border-bottom:none;}
table.tbl tbody tr{cursor:default;}
table.tbl tbody tr.clickable:hover{background:var(--blue-bg);cursor:pointer;}
.num{text-align:right;font-variant-numeric:tabular-nums;}
.tbl .name-cell{font-weight:600;}
.muted{color:var(--muted);}
.faint{color:var(--faint);}
.empty{padding:48px 20px;text-align:center;color:var(--faint);}
.empty svg{width:40px;height:40px;stroke:var(--border-strong);fill:none;stroke-width:1.5;margin-bottom:10px;}

/* ===== Badges ===== */
.badge{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 9px;border-radius:6px;font-size:12px;font-weight:700;white-space:nowrap;}
.badge .bd{width:6px;height:6px;border-radius:50%;background:currentColor;}
.b-gray{background:#F2F4F7;color:#475467;}
.b-blue{background:var(--blue-soft);color:var(--blue-dark);}
.b-teal{background:#D9F2EF;color:var(--teal);}
.b-orange{background:var(--warning-bg);color:#B45309;}
.b-green{background:var(--success-bg);color:#15803D;}
.b-purple{background:var(--purple-bg);color:#6D28D9;}
.b-red{background:var(--danger-bg);color:#B91C1C;}
.chip{display:inline-flex;align-items:center;gap:5px;height:24px;padding:0 10px;border-radius:20px;font-size:12px;font-weight:600;background:var(--bg);border:1px solid var(--border);color:var(--muted);}

/* ===== Tabs ===== */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto;}
.tab{padding:10px 15px;font-weight:600;font-size:13.5px;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;margin-bottom:-1px;}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.filter-tabs{display:inline-flex;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:16px;flex-wrap:wrap;}
.filter-tab{padding:7px 13px;border-radius:7px;font-weight:600;font-size:13px;color:var(--muted);}
.filter-tab:hover{color:var(--ink);}
.filter-tab.active{background:#fff;color:var(--blue-dark);box-shadow:var(--shadow);}
.filter-tab .cnt{margin-left:5px;font-size:11px;color:var(--faint);}
.filter-tab.active .cnt{color:var(--blue);}

/* ===== Forms ===== */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--slate,#374151);margin-bottom:6px;}
.field label .req{color:var(--danger);}
.field input,.field select,.field textarea{
  width:100%;height:40px;border:1px solid var(--border);border-radius:9px;padding:0 12px;outline:none;background:#fff;color:var(--ink);
}
.field textarea{height:auto;padding:10px 12px;resize:vertical;min-height:70px;line-height:1.55;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft);}
.field .hint{font-size:11.5px;color:var(--faint);margin-top:4px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.input-money{text-align:right;font-variant-numeric:tabular-nums;}

/* ===== Modal ===== */
.modal-bg{position:fixed;inset:0;background:rgba(16,24,40,.45);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;box-shadow:var(--shadow-md);animation:pop .16s ease;}
.modal.wide{max-width:860px;}
@keyframes pop{from{transform:translateY(8px);opacity:0;}to{transform:none;opacity:1;}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-head h3{font-size:17px;}
.modal-head .x{width:30px;height:30px;border-radius:8px;border:none;background:var(--bg);color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;}
.modal-head .x:hover{background:var(--danger-bg);color:var(--danger);}
.modal-body{padding:22px;max-height:calc(100vh - 220px);overflow-y:auto;}
.modal-foot{padding:15px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--bg);border-radius:0 0 16px 16px;}

/* toast */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;}
.toast{background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow-md);animation:pop .16s ease;display:flex;align-items:center;gap:8px;}
.toast.ok{background:#065F46;}
.toast.warn{background:#92400E;}
.toast.err{background:#991B1B;}

/* misc layout helpers */
.row{display:flex;gap:16px;}
.between{display:flex;align-items:center;justify-content:space-between;}
.gap8{gap:8px;}.gap12{gap:12px;}
.mt8{margin-top:8px;}.mt12{margin-top:12px;}.mt16{margin-top:16px;}.mt20{margin-top:20px;}
.mb0{margin-bottom:0;}
.wrap-flex{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.kv{display:flex;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px;}
.kv:last-child{border-bottom:none;}
.kv .k{width:130px;flex-shrink:0;color:var(--muted);font-weight:600;}
.kv .v{font-weight:600;}
.divider{height:1px;background:var(--border);margin:16px 0;}
.pill-toggle{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.pill-toggle button{border:none;background:#fff;padding:7px 12px;font-weight:600;font-size:12.5px;color:var(--muted);}
.pill-toggle button.active{background:var(--blue);color:#fff;}

/* detail header */
.detail-head{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px;box-shadow:var(--shadow);}
.detail-head .top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.detail-head h2{font-size:21px;display:flex;align-items:center;gap:10px;}
.detail-head .meta{color:var(--muted);font-size:13px;margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.mini-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px;}
.mini-stat{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.mini-stat .l{font-size:12px;color:var(--muted);font-weight:600;}
.mini-stat .v{font-size:18px;font-weight:800;margin-top:4px;}

/* quote builder */
.builder{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start;}
.summary-panel{position:sticky;top:84px;}
.sum-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--border);font-size:14px;}
.sum-row.total{border-bottom:none;font-size:16px;font-weight:800;padding-top:12px;}
.sum-row .pos{color:var(--success);font-weight:700;}
.item-row{display:grid;grid-template-columns:110px 1fr 90px 110px 110px 32px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.item-row input,.item-row select{height:36px;}
.item-row .del{width:30px;height:30px;border:none;background:var(--danger-bg);color:var(--danger);border-radius:7px;font-size:15px;}

@media(max-width:1100px){.builder{grid-template-columns:1fr;}.summary-panel{position:static;}.mini-stats{grid-template-columns:repeat(2,1fr);}}
@media(max-width:860px){
  .sidebar{position:fixed;left:-240px;z-index:120;transition:left .2s;box-shadow:var(--shadow-md);}
  .sidebar.open{left:0;}
  .menu-toggle{display:flex !important;}
  .content{padding:16px;}
  .form-row,.form-row-3{grid-template-columns:1fr;}
}

<script>
/* ============================================================
   굿투어 ERP — 코어: 저장소 / 시드 / 유틸
   ============================================================ */
const KEY='goodtour_erp_v1';
let DB=null;

function loadDB(){
  try{ const raw=localStorage.getItem(KEY); if(raw){ DB=JSON.parse(raw); return; } }catch(e){}
  DB=seed(); saveDB();
}
function saveDB(){ try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){ console.warn('save fail',e); } }
function resetDB(){ localStorage.removeItem(KEY); DB=seed(); saveDB(); }

/* ---------- id / date utils ---------- */
let _seq=Date.now();
function uid(){ return (++_seq).toString(36)+Math.floor(Math.random()*1e4).toString(36); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function nowISO(){ return new Date().toISOString().slice(0,16); }
function addDays(iso,n){ const d=new Date(iso); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function daysUntil(iso){ if(!iso) return null; const a=new Date(todayISO()); const b=new Date(iso.slice(0,10)); return Math.round((b-a)/86400000); }
function fmtDate(iso){ if(!iso) return '-'; return iso.slice(0,10); }
function fmtDateK(iso){ if(!iso) return '-'; const d=new Date(iso); if(isNaN(d)) return iso; const wd=['일','월','화','수','목','금','토'][d.getDay()]; return `${iso.slice(0,10)} (${wd})`; }
function fmtDateTime(iso){ if(!iso) return '-'; return iso.slice(0,16).replace('T',' '); }
function money(n){ if(n==null||n==='') return '0'; return Math.round(Number(n)).toLocaleString('ko-KR'); }
function won(n){ return money(n)+'원'; }
function parseNum(v){ if(v==null) return 0; return Number(String(v).replace(/[^0-9.-]/g,''))||0; }

/* ---------- role / status maps ---------- */
const ROLES={ admin:'관리자', manager:'매니저', staff:'상담직원', accounting:'정산담당', readonly:'조회전용' };
const CUSTOMER_TYPES={ individual:'개인', family:'가족여행', group:'단체', company:'기업', school:'학교', club:'동호회' };
const CHANNELS={ phone:'전화', sms:'문자', kakao:'카카오', visit:'방문', etc:'기타' };
const CONSULT_STATUS={ new:'신규', in_progress:'상담중', quote_needed:'견적필요', pending:'보류', done:'완료' };
const PRIORITY={ normal:'보통', important:'중요', urgent:'긴급' };

/* 예약 상태 (기능명세 2번) */
const RES_STATUS={
  inquiry:'문의접수', info_completed:'정보입력완료', consulting:'상담중', quote_sent:'견적발송',
  review:'예약검토', deposit_requested:'예약금요청', deposit_paid:'예약금입금', confirmed:'예약확정',
  balance_requested:'잔금요청', paid:'잔금완료', ready:'출발대기', traveling:'여행중',
  completed:'여행완료', cancelled:'취소', refunding:'환불진행', refunded:'환불완료',
  changed:'일정변경', disruption:'결항처리'
};
const RES_STATUS_BADGE={
  inquiry:'b-gray', info_completed:'b-blue', consulting:'b-blue', quote_sent:'b-blue',
  review:'b-blue', deposit_requested:'b-orange', deposit_paid:'b-teal', confirmed:'b-teal',
  balance_requested:'b-orange', paid:'b-green', ready:'b-purple', traveling:'b-purple',
  completed:'b-green', cancelled:'b-red', refunding:'b-red', refunded:'b-red',
  changed:'b-purple', disruption:'b-purple'
};
/* 예약 상태 흐름 순서 (진행률/정렬용) */
const RES_FLOW=['inquiry','info_completed','consulting','quote_sent','review','deposit_requested','deposit_paid','confirmed','balance_requested','paid','ready','traveling','completed'];

const QUOTE_STATUS={ draft:'작성중', sent:'발송', viewed:'열람', revised:'수정', accepted:'수락', converted:'예약전환', discarded:'폐기' };
const QUOTE_STATUS_BADGE={ draft:'b-gray', sent:'b-blue', viewed:'b-blue', revised:'b-orange', accepted:'b-green', converted:'b-teal', discarded:'b-red' };

const PAY_METHOD={ bank:'계좌이체', card:'카드', cash:'현금', etc:'기타' };
const PAY_TYPE={ deposit:'예약금', balance:'잔금', extra:'추가금' };
const SEG_STATUS={ checking:'확인중', reserved:'예약', confirmed:'확정', changed:'변경', cancelled:'취소', disrupted:'결항' };
const SEG_STATUS_BADGE={ checking:'b-gray', reserved:'b-blue', confirmed:'b-green', changed:'b-orange', cancelled:'b-red', disrupted:'b-purple' };
const TEMPLATE_TYPES={ form_request:'예약정보 입력 요청', quote:'견적서 발송', deposit:'예약금 입금 안내', confirmed:'예약확정 안내', balance:'잔금 안내', departure:'출발 안내', ferry:'배편 안내', lodging:'숙소 안내', change:'일정변경 안내', disruption:'결항 안내', refund:'환불 안내', completed:'여행완료 안내' };

function resBadge(s){ return `<span class="badge ${RES_STATUS_BADGE[s]||'b-gray'}"><span class="bd"></span>${RES_STATUS[s]||s}</span>`; }
function quoteBadge(s){ return `<span class="badge ${QUOTE_STATUS_BADGE[s]||'b-gray'}">${QUOTE_STATUS[s]||s}</span>`; }
function segBadge(s){ return `<span class="badge ${SEG_STATUS_BADGE[s]||'b-gray'}">${SEG_STATUS[s]||s}</span>`; }
function consultBadge(s){ const m={new:'b-gray',in_progress:'b-blue',quote_needed:'b-orange',pending:'b-purple',done:'b-green'}; return `<span class="badge ${m[s]||'b-gray'}">${CONSULT_STATUS[s]||s}</span>`; }
function prioBadge(p){ if(p==='normal') return ''; const m={important:'b-orange',urgent:'b-red'}; return `<span class="badge ${m[p]||'b-gray'}">${PRIORITY[p]}</span>`; }

/* ---------- number gen ---------- */
function quoteNumber(){ const seq=(DB.quotes.length+1).toString().padStart(4,'0'); return 'Q-'+todayISO().replace(/-/g,'')+'-'+seq; }
function resNumber(){ const seq=(DB.reservations.length+1).toString().padStart(4,'0'); return 'R-'+todayISO().replace(/-/g,'')+'-'+seq; }

/* ---------- lookups ---------- */
const byId=(arr,id)=>arr.find(x=>x.id===id);
const userName=id=>{ const u=byId(DB.users,id); return u?u.name:'-'; };
const custName=id=>{ const c=byId(DB.customers,id); return c?c.name:'-'; };
function custById(id){ return byId(DB.customers,id); }
function resById(id){ return byId(DB.reservations,id); }

/* ---------- financial calcs ---------- */
function quoteTotals(q){
  const items=DB.quote_items.filter(i=>i.quote_id===q.id);
  let sale=0,cost=0;
  items.forEach(i=>{ const qty=i.quantity||1; sale+=(i.sale_price||0)*qty; cost+=(i.cost_price||0)*qty; });
  const profit=sale-cost; const margin=sale?(profit/sale*100):0;
  return {sale,cost,profit,margin,items};
}
function resPaid(resId){ return DB.payments.filter(p=>p.reservation_id===resId).reduce((s,p)=>s+(p.amount||0),0); }
function resRefunded(resId){ return DB.refunds.filter(r=>r.reservation_id===resId&&r.status==='completed').reduce((s,r)=>s+(r.amount||0),0); }
function resBalance(res){ return (res.total_price||0)-resPaid(res.id); }
function resProfit(res){ return (res.total_price||0)-(res.total_cost||0)-resRefunded(res.id); }

/* ---------- change log ---------- */
function logChange(target_type,target_id,change_type,before,after,reason){
  DB.change_logs.unshift({ id:uid(), target_type, target_id, user_id:session().id,
    change_type, before_value:String(before??''), after_value:String(after??''), reason:reason||'', created_at:nowISO() });
}
function setResStatus(res,newStatus,reason){
  if(res.status===newStatus) return;
  logChange('reservations',res.id,'status_change',RES_STATUS[res.status],RES_STATUS[newStatus],reason);
  res.status=newStatus; res.updated_at=nowISO();
}

/* ---------- session ---------- */
function session(){ return byId(DB.users,DB._session)||DB.users[0]; }
function setSession(uid){ DB._session=uid; saveDB(); }
function can(perm){ const r=session().role; if(r==='admin') return true; if(r==='readonly') return false;
  const map={ accounting:['payment','refund','analytics'], manager:['customer','consult','quote','reservation','payment','analytics'], staff:['customer','consult','quote','reservation'] };
  return (map[r]||[]).includes(perm);
}

  return `<img src="data:image/png;base64,${GT_LOGO_B64}" style="height:${h}px;width:auto;flex-shrink:0;" alt="good-tour">`;

let _toastTimer;
function toast(msg,type){ const r=document.getElementById('toast-root'); const t=document.createElement('div'); t.className='toast '+(type||''); t.innerHTML=msg; r.appendChild(t); setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); },2600); }

function openModal(html,opts){ opts=opts||{}; const root=document.getElementById('modal-root'); root.innerHTML=`<div class="modal-bg" id="modal-bg"><div class="modal ${opts.wide?'wide':''}">${html}</div></div>`; document.getElementById('modal-bg').addEventListener('mousedown',e=>{ if(e.target.id==='modal-bg'&&!opts.persist) closeModal(); }); }
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

function confirmDialog(title,body,onYes,yesLabel,yesClass){
  openModal(`
    <div class="modal-head"><h3>${title}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body"><div style="font-size:14px;line-height:1.6;">${body}</div></div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">취소</button>
    <button class="btn ${yesClass||'btn-primary'}" id="confirm-yes">${yesLabel||'확인'}</button></div>`);
  document.getElementById('confirm-yes').onclick=()=>{ closeModal(); onYes&&onYes(); };
}

/* status change 추천 프롬프트 */
function suggestStatus(res,newStatus,msg){
  openModal(`
    <div class="modal-head"><h3>상태 변경 확인</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body"><div style="font-size:14px;line-height:1.7;">${msg}<br><br>예약상태를 <b>'${RES_STATUS[newStatus]}'</b>(으)로 변경할까요?</div></div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">나중에</button>
    <button class="btn btn-primary" id="ss-yes">${RES_STATUS[newStatus]} 처리</button></div>`);
  document.getElementById('ss-yes').onclick=()=>{ setResStatus(res,newStatus,'입금/이벤트 기반 추천'); saveDB(); closeModal(); toast('상태가 변경되었습니다','ok'); render(); };
}
</script>
<script>
/* ============================================================
   라우터 & 셸
   ============================================================ */
const NAV=[
  {sec:true, tone:'blue'},
  {id:'dashboard',label:'대시보드',icon:'grid',route:'#/'},
  {sec:true, tone:'teal', head:{id:'customers',label:'고객',icon:'users',route:'#/customers'}},
  {id:'consult',label:'상담',icon:'chat',children:[
    {id:'consultations',label:'상담관리',route:'#/consultations'},
    {id:'call_records',label:'상담내역',route:'#/call-records'},
  ]},
  {id:'quote_new',label:'자동견적',icon:'plus',route:'#/quotes/new'},
  {id:'quotes',label:'견적내역',icon:'doc',route:'#/quotes'},
  {id:'reservations',label:'예약/문자',icon:'calendar',route:'#/reservations'},
  {sec:true, tone:'amber', head:{id:'payments',label:'회계',icon:'calc',route:'#/payments'}},
  {id:'payments',label:'입금/정산',icon:'card',route:'#/payments'},
  {id:'analytics',label:'매출분석',icon:'chart',route:'#/analytics'},
  {sec:true, tone:'violet', head:{id:'settings',label:'관리',icon:'gear',route:'#/settings'}},
  {id:'settings',label:'설정',icon:'gear',route:'#/settings'},
];

function parseHash(){
  let h=location.hash||'#/';
  const parts=h.replace(/^#\//,'').split('/').filter(x=>x!=='');
  return { seg:parts, raw:h };
}
function nav(route){ location.hash=route; }

let _navOpen=new Set(['consult']); /* 사이드바 접이식 메뉴 열림 상태 */
function activeNavId(){
  const {seg}=parseHash();
  if(seg.length===0) return 'dashboard';
  const r=seg[0];
  if(r==='quotes'){ const sub=(seg[1]||'').split('?')[0]; return sub==='new'?'quote_new':'quotes'; }
  if(r==='call-records') return 'call_records';
  if(r==='sms') return 'reservations'; /* 문자 화면은 예약/문자 메뉴에 귀속 */
  return r;
}
function toggleNav(id){
  const el=document.querySelector(`.sb-parent[data-id="${id}"]`);
  if(!el) return;
  const open=el.classList.toggle('open');
  if(open) _navOpen.add(id); else _navOpen.delete(id);
}

function boot(){
  loadDB();
  window.addEventListener('hashchange',render);
  render();
}

function render(){
  const {seg}=parseHash();
  const app=document.getElementById('app');
  // public routes
  if(seg[0]==='form'){ renderPublicForm(app,seg[1]); return; }
  if(seg[0]==='preview'){ renderQuotePreview(app,seg[1]); return; }
  if(seg[0]==='login'){ renderLogin(app); return; }
  // shell
  renderShell(app);
  const content=document.getElementById('content');
  const route=seg[0]||'dashboard';
  try{
    if(route==='dashboard') renderDashboard(content);
    else if(route==='customers'){ seg[1]?renderCustomerDetail(content,seg[1]):renderCustomers(content); }
    else if(route==='consultations') renderConsultations(content);
    else if(route==='call-records') renderCallRecords(content);
    else if(route==='quotes'){ const sub=(seg[1]||'').split('?')[0]; sub==='new'?renderQuoteBuilder(content,null):(sub?renderQuoteBuilder(content,sub):renderQuotes(content)); }
    else if(route==='reservations'){ seg[1]?renderReservationDetail(content,seg[1]):renderReservations(content); }
    else if(route==='payments') renderPayments(content);
    else if(route==='sms') renderSms(content);
    else if(route==='analytics') renderAnalytics(content);
    else if(route==='settings') renderSettings(content);
    else content.innerHTML='<div class="empty">페이지를 찾을 수 없습니다.</div>';
  }catch(err){ console.error(err); content.innerHTML='<div class="card card-pad" style="color:var(--danger)">오류가 발생했습니다: '+err.message+'</div>'; }
}

function renderShell(app){
  const u=session();
  const act=activeNavId();
  // NAV를 섹션 단위로 그룹화 (헤드 + 하위 항목)
  const sections=[]; let cur=null;
  NAV.forEach(n=>{ if(n.sec){ cur={head:n.head||null,label:n.label||null,tone:n.tone||'',items:[]}; sections.push(cur); } else if(cur){ cur.items.push(n); } });
  const navBadge=id=>{
    if(id==='consultations'){ const c=DB.consultations.filter(x=>x.next_contact_at&&x.next_contact_at.slice(0,10)<=todayISO()&&x.status!=='done').length; return c?`<span class="badge-n">${c}</span>`:''; }
    if(id==='payments'){ const c=DB.reservations.filter(r=>resBalance(r)>0&&['confirmed','balance_requested','deposit_paid','ready'].includes(r.status)).length; return c?`<span class="badge-n">${c}</span>`:''; }
    return '';
  };
  const navItem=n=>{
    if(n.children){
      const childActive=n.children.some(c=>c.id===act);
      const open=_navOpen.has(n.id)||childActive;
      return `<div class="sb-parent ${open?'open':''}" data-id="${n.id}">
        <button type="button" class="sb-item sb-toggle ${childActive?'pactive':''}" onclick="toggleNav('${n.id}')">${ic(n.icon)}<span>${n.label}</span><span class="sb-tail"><svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>${navBadge('consultations')}</span></button>
        <div class="sb-sub">${n.children.map(c=>`<a class="sb-item sb-child ${act===c.id?'active':''}" href="${c.route}" onclick="closeSidebar()"><span class="cdot"></span><span>${c.label}</span></a>`).join('')}</div>
      </div>`;
    }
    return `<a class="sb-item ${act===n.id?'active':''}" href="${n.route}" onclick="closeSidebar()">${ic(n.icon)}<span>${n.label}</span>${navBadge(n.id)}</a>`;
  };
  const navHtml=sections.map(s=>{
    const memberIds=[...(s.head?[s.head.id]:[]),...s.items.flatMap(i=>i.children?[i.id,...i.children.map(c=>c.id)]:[i.id])];
    const secActive=memberIds.includes(act);
    let html='';
    if(s.label) html+=`<div class="sb-group">${s.label}</div>`;
    html+=`<div class="sb-section ${s.tone?'tone-'+s.tone:''}">`;
    if(s.head){ const h=s.head; html+=`<a class="sb-head ${secActive?'active':''}" href="${h.route}" onclick="closeSidebar()">${ic(h.icon)}<span>${h.label}</span></a>`; }
    html+=s.items.map(navItem).join('');
    html+=`</div>`;
    return html;
  }).join('');
  app.innerHTML=`
  <div class="scrim" id="scrim" onclick="closeSidebar()"></div>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sb-logo" style="flex-direction:column;align-items:flex-start;gap:7px;">${gtLogo(40)}<small style="font-weight:700;font-size:10px;color:var(--faint);letter-spacing:.8px;">굿투어 ERP · ULLEUNGDO</small></div>
      <nav class="sb-nav">${navHtml}</nav>
      <div class="sb-user">
        <div class="av">${u.name.slice(0,1)}</div>
        <div><div class="nm">${u.name}</div><div class="rl">${ROLES[u.role]}</div></div>
        <a class="out" href="#/login" title="계정 전환">전환</a>
      </div>
    </aside>
    <div class="main">
      <div class="topbar">
        <button class="menu-toggle" onclick="openSidebar()">${ic('grid')}</button>
        <div class="search">
          ${ic('search','si')}
          <input id="global-search" placeholder="고객명 · 연락처 · 예약번호 검색" oninput="doSearch(this.value)" onblur="setTimeout(()=>{var r=document.getElementById('search-results');if(r)r.remove();},200)">
          <div id="search-box"></div>
        </div>
        <div class="tb-actions">
          <button class="btn btn-sm btn-ghost" onclick="quickAdd()">${ic('plus','ic')} 빠른 등록</button>
        </div>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>`;
}
function openSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('scrim').classList.add('show'); }
function closeSidebar(){ const s=document.getElementById('sidebar'); if(s)s.classList.remove('open'); const c=document.getElementById('scrim'); if(c)c.classList.remove('show'); }

function doSearch(q){
  const box=document.getElementById('search-box'); if(!box) return;
  q=q.trim(); if(!q){ box.innerHTML=''; return; }
  const ql=q.toLowerCase();
  const res=[];
  DB.customers.forEach(c=>{ if(c.name.includes(q)||c.phone.replace(/-/g,'').includes(q.replace(/-/g,''))) res.push({t:c.name,s:c.phone+' · '+CUSTOMER_TYPES[c.customer_type],r:'#/customers/'+c.id}); });
  DB.reservations.forEach(r=>{ if(r.reservation_number.toLowerCase().includes(ql)||custName(r.customer_id).includes(q)) res.push({t:r.reservation_number,s:custName(r.customer_id)+' · '+RES_STATUS[r.status],r:'#/reservations/'+r.id}); });
  box.innerHTML=res.length?`<div class="search-results" id="search-results">${res.slice(0,8).map(x=>`<a href="${x.r}" onclick="document.getElementById('global-search').value=''"><div class="t">${x.t}</div><div class="s">${x.s}</div></a>`).join('')}</div>`:`<div class="search-results" id="search-results"><div style="padding:14px;color:var(--faint)">검색 결과가 없습니다</div></div>`;
}
function quickAdd(){ openCustomerModal(); }

/* ============================================================
   로그인 (계정 선택 방식)
   ============================================================ */
function renderLogin(app){
  app.innerHTML=`
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#1B68FA 0%,#0F766E 100%);padding:20px;">
    <div style="background:#fff;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.25);width:100%;max-width:400px;padding:34px 30px;">
      <div style="margin-bottom:6px;">
        ${gtLogo(56)}
        <div style="font-size:11px;color:var(--faint);letter-spacing:.5px;margin-top:9px;">굿투어 ERP · ULLEUNGDO OPERATION SYSTEM</div>
      </div>
      <p style="color:var(--muted);font-size:13px;margin:14px 0 18px;">사용할 직원 계정을 선택해 로그인하세요.</p>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${DB.users.filter(u=>u.is_active).map(u=>`
          <button class="btn" style="justify-content:flex-start;height:52px;" onclick="login('${u.id}')">
            <span style="width:34px;height:34px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;">${u.name.slice(0,1)}</span>
            <span style="text-align:left;"><span style="font-weight:700;display:block;">${u.name}</span><span style="font-size:12px;color:var(--muted);">${ROLES[u.role]} · ${u.email}</span></span>
          </button>`).join('')}
      </div>
      <div style="margin-top:18px;border-top:1px solid var(--border);padding-top:14px;text-align:center;">
        <button class="btn btn-ghost btn-sm" onclick="if(confirm('데모 데이터를 초기화할까요?')){resetDB();toast('초기화되었습니다','ok');nav('#/');}">데모 데이터 초기화</button>
      </div>
    </div>
  </div>`;
}
function login(id){ setSession(id); const u=session(); u.last_login_at=nowISO(); saveDB(); toast(u.name+'님 로그인','ok'); nav('#/'); }

/* ============================================================
   대시보드
   ============================================================ */
function renderDashboard(el){
  const T=todayISO();
  const recentCustomers=DB.customers.filter(c=>daysUntil(c.created_at)>=-7).length;
  const quoteNeeded=DB.consultations.filter(c=>c.status==='quote_needed').length + DB.quotes.filter(q=>q.status==='draft').length;

/* ---- 예약 캘린더 ---- */
let _calBase=null;
function calCard(){
  const base=_calBase||todayISO().slice(0,7);
  const [y,m]=base.split('-').map(Number);
  const startDow=new Date(y,m-1,1).getDay();
  const dim=new Date(y,m,0).getDate();
  const T=todayISO();
  const dows=['일','월','화','수','목','금','토'];
  let cells=dows.map((d,i)=>`<div class="cal-dow" style="${i===0?'color:var(--danger);':i===6?'color:var(--blue);':''}">${d}</div>`).join('');
  for(let i=0;i<startDow;i++) cells+='<div class="cal-cell off"></div>';
  for(let d=1;d<=dim;d++){
    const iso=base+'-'+String(d).padStart(2,'0');
    const deps=DB.reservations.filter(r=>r.travel_start_date===iso&&!['cancelled','refunded'].includes(r.status));
    const rets=DB.reservations.filter(r=>r.travel_end_date===iso&&!['cancelled','refunded'].includes(r.status));
    cells+=`<div class="cal-cell ${iso===T?'today':''} ${deps.length?'has':''}" ${deps.length?`onclick="openDayModal('${iso}')"`:''}>
      <div class="d">${d}</div>
      ${deps.length?`<span class="cal-dep">출발 ${deps.length}</span>`:''}
      ${rets.length?'<span class="cal-ret" title="귀가"></span>':''}
    </div>`;
  }
  return `<div class="card mt16">
    <div class="card-head"><h3>예약 캘린더</h3>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <span style="font-size:12px;color:var(--muted);"><span style="display:inline-block;width:9px;height:9px;border-radius:3px;background:var(--blue);margin-right:4px;vertical-align:-1px;"></span>출발<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--teal);margin:0 4px 0 12px;vertical-align:-1px;"></span>귀가</span>
        <b style="font-size:14px;">${y}년 ${m}월</b>
        <div class="pill-toggle"><button onclick="calShift(-1)">‹</button><button onclick="calShift(0)">오늘</button><button onclick="calShift(1)">›</button></div>
      </div>
    </div>
    <div class="card-pad"><div class="cal-grid">${cells}</div></div>
  </div>`;
}
function calShift(d){
  if(d===0){ _calBase=null; }
  else{ const base=_calBase||todayISO().slice(0,7); let [y,m]=base.split('-').map(Number); m+=d; if(m<1){m=12;y--;} if(m>12){m=1;y++;} _calBase=y+'-'+String(m).padStart(2,'0'); }
  renderDashboard(document.getElementById('content'));
}
function openDayModal(iso){
  const alive=r=>!['cancelled','refunded'].includes(r.status);
  const deps=DB.reservations.filter(r=>r.travel_start_date===iso&&alive(r));
  const rets=DB.reservations.filter(r=>r.travel_end_date===iso&&alive(r));
  const row=r=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="closeModal();nav('#/reservations/${r.id}')">
    <b>${r.reservation_number}</b><span>${custName(r.customer_id)} · ${r.adults+r.children+r.infants}명</span><span style="margin-left:auto;">${resBadge(r.status)}</span></div>`;
  openModal(`<div class="modal-head"><h3>${fmtDateK(iso)}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div style="font-weight:700;font-size:13px;color:var(--muted);margin-bottom:4px;">출발 (${deps.length})</div>${deps.map(row).join('')||'<div class="muted" style="padding:8px 0;font-size:13px;">없음</div>'}
      <div style="font-weight:700;font-size:13px;color:var(--muted);margin:14px 0 4px;">귀가 (${rets.length})</div>${rets.map(row).join('')||'<div class="muted" style="padding:8px 0;font-size:13px;">없음</div>'}
    </div>`);
}
function resTargetName(id){ const r=resById(id); return r?r.reservation_number:id; }
function consultStatusText(c){ return CONSULT_STATUS[c.status]; }

let _custFilter={q:'',type:'',user:''};
function customerLatestRes(custId){ return DB.reservations.filter(r=>r.customer_id===custId).sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''))[0]; }

function custFilteredList(){
  const f=_custFilter;
  let list=DB.customers.slice();
  if(f.q) list=list.filter(c=>c.name.includes(f.q)||c.phone.replace(/-/g,'').includes(f.q.replace(/-/g,'')));
  if(f.type) list=list.filter(c=>c.customer_type===f.type);
  if(f.user) list=list.filter(c=>c.assigned_user_id===f.user);
  return list.sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
}
function custTableCard(list){

function custSearch(val){

function phoneFmt(inp){ let v=inp.value.replace(/[^0-9]/g,'').slice(0,11); if(v.length>=8) v=v.replace(/(\d{3})(\d{3,4})(\d{4})/,'$1-$2-$3'); else if(v.length>=4) v=v.replace(/(\d{3})(\d+)/,'$1-$2'); inp.value=v; }
function saveCustomer(id){
  const name=document.getElementById('cf-name').value.trim();
  const phone=document.getElementById('cf-phone').value.trim();
  const type=document.getElementById('cf-type').value;
  const user=document.getElementById('cf-user').value;
  const privacy=document.getElementById('cf-privacy').checked;
  if(!name){ toast('고객명을 입력하세요','err'); return; }
  if(!phone||phone.replace(/[^0-9]/g,'').length<10){ toast('올바른 휴대폰 번호를 입력하세요','err'); return; }
  if(!privacy){ toast('개인정보 동의가 필요합니다','err'); return; }
  // 중복 검사
  const dup=DB.customers.find(c=>c.phone.replace(/-/g,'')===phone.replace(/-/g,'')&&c.id!==id);
  if(dup && !id){
    confirmDialog('연락처 중복 알림',`동일 연락처의 고객 <b>${dup.name}</b>님이 이미 등록되어 있습니다.<br>그래도 새 고객으로 등록할까요?`,()=>{ commitCustomer(id,name,phone,type,user,privacy); },'새 고객으로 등록','btn-primary');
    return;
  }
  commitCustomer(id,name,phone,type,user,privacy);
}
function commitCustomer(id,name,phone,type,user,privacy){
  const birth=document.getElementById('cf-birth').value;
  const region=document.getElementById('cf-region').value.trim();
  const memo=document.getElementById('cf-memo').value.trim();
  if(id){ const c=custById(id); Object.assign(c,{name,phone,customer_type:type,assigned_user_id:user,birth_date:birth,region,memo,updated_at:nowISO()}); if(privacy&&!c.privacy_agreed_at)c.privacy_agreed_at=nowISO(); logChange('customers',id,'edit','','','정보 수정'); toast('수정되었습니다','ok'); }
  else{ const nid=uid(); DB.customers.push({id:nid,name,phone,birth_date:birth,region,customer_type:type,memo,privacy_agreed_at:privacy?nowISO():null,assigned_user_id:user,created_at:nowISO()}); toast('고객이 등록되었습니다','ok'); }
  saveDB(); closeModal(); render();
}

function formStatusBadge(s){ const m={created:'b-gray',sent:'b-blue',submitted:'b-green',expired:'b-red'}; const t={created:'생성',sent:'발송',submitted:'제출완료',expired:'만료'}; return `<span class="badge ${m[s]}">${t[s]}</span>`; }
function smsStatusBadge(s){ const m={pending:'b-gray',sent:'b-green',failed:'b-red'}; const t={pending:'대기',sent:'발송',failed:'실패'}; return `<span class="badge ${m[s]}">${t[s]}</span>`; }
function changeLogCard(list){
  return `<div class="card"><div class="tbl-wrap"><table class="tbl">
    <thead><tr><th>일시</th><th>대상</th><th>변경유형</th><th>변경 전</th><th>변경 후</th><th>변경자</th><th>사유</th></tr></thead>

  </table></div></div>`;
}
function changeTypeK(t){ const m={status_change:'상태변경',price_change:'금액변경',date_change:'일정변경',edit:'정보수정',payment:'입금',refund:'환불',create:'생성'}; return m[t]||t; }
function quoteTableCard(list,withNew){
  return `<div class="card"><div class="tbl-wrap"><table class="tbl">
    <thead><tr><th>견적번호</th><th>출발일</th><th>상태</th><th class="num">판매가</th><th class="num">이익</th><th class="num">마진율</th><th></th></tr></thead>

function createFormLink(custId){
  const c=custById(custId);
  const days=parseInt(document.getElementById('fl-days').value);
  const token=uid().slice(0,8);
  const form={id:uid(),customer_id:custId,token,status:'sent',expires_at:addDays(todayISO(),days)+'T23:59',submitted_at:null,adults:0,created_at:nowISO()};
  DB.customer_forms.push(form);
  const url=location.origin+location.pathname+'#/form/'+token;
  // 문자 로그
  const tpl=DB.sms_templates.find(t=>t.template_type==='form_request');
  const msg=fillTemplate(tpl?tpl.content:'예약정보 입력을 부탁드립니다. {예약정보링크}',c,null,{예약정보링크:url});
  DB.sms_logs.unshift({id:uid(),customer_id:custId,reservation_id:null,template_id:tpl?tpl.id:null,phone:c.phone,message:msg,status:'sent',provider_message_id:'MSG-'+uid().slice(0,6),sent_by:session().id,sent_at:nowISO()});
  saveDB();
  document.getElementById('fl-result').innerHTML=`<div class="divider"></div>
    <div style="background:var(--success-bg);border:1px solid #bfe6cb;border-radius:9px;padding:12px;">
      <div style="font-weight:700;color:#15803D;margin-bottom:6px;">✓ 링크 생성 및 문자 발송 완료</div>
      <div style="font-size:12.5px;word-break:break-all;">${url}</div>
      <div style="margin-top:8px;display:flex;gap:6px;"><a class="btn btn-sm" href="#/form/${token}" target="_blank" onclick="closeModal()">입력폼 미리보기 ↗</a><a class="btn btn-sm" href="sms:${c.phone}?body=${encodeURIComponent(msg)}">실제 문자앱 열기</a></div>
    </div>`;
  toast('입력 링크를 발송했습니다','ok');
}

let _consultFilter='today';
function renderConsultations(el){
  const T=todayISO();
  const F=_consultFilter;
  const all=DB.consultations.slice();
  const filters={
    today:{label:'오늘 재통화',fn:c=>c.next_contact_at&&c.next_contact_at.slice(0,10)<=T&&c.status!=='done'},
    quote_needed:{label:'견적필요',fn:c=>c.status==='quote_needed'},
    in_progress:{label:'상담중',fn:c=>c.status==='in_progress'},
    pending:{label:'보류',fn:c=>c.status==='pending'},
    done:{label:'완료',fn:c=>c.status==='done'},
    all:{label:'전체',fn:()=>true},
  };
  let list=all.filter(filters[F].fn).sort((a,b)=>{
    const ax=a.next_contact_at||a.created_at, bx=b.next_contact_at||b.created_at;
    return F==='done'?(bx||'').localeCompare(ax||''):(ax||'').localeCompare(bx||'');
  });
  el.innerHTML=`
  <div class="page-head">
    <div><h1>상담관리</h1><div class="sub">다음 연락 일정과 상담 상태를 관리합니다.</div></div>
    <div class="actions"><button class="btn btn-primary" onclick="openConsultModal()">${ic('plus','ic')} 상담등록</button></div>
  </div>
  <div class="filter-tabs">${Object.entries(filters).map(([k,v])=>`<div class="filter-tab ${F===k?'active':''}" onclick="_consultFilter='${k}';renderConsultations(document.getElementById('content'))">${v.label}<span class="cnt">${all.filter(v.fn).length}</span></div>`).join('')}</div>
  <div class="card"><div class="tbl-wrap"><table class="tbl">
    <thead><tr><th>고객</th><th>상담상태</th><th>중요도</th><th>다음 할 일</th><th>다음 연락</th><th>방식</th><th>담당자</th></tr></thead>
    <tbody>${list.map(c=>{ const late=c.next_contact_at&&c.next_contact_at.slice(0,10)<T&&c.status!=='done'; return `
      <tr class="clickable" onclick="openConsultModal('${c.id}')">
        <td class="name-cell">${custName(c.customer_id)}</td>
        <td>${consultBadge(c.status)}</td>
        <td>${prioBadge(c.priority)||'<span class="faint">보통</span>'}</td>
        <td>${c.next_action||'<span class="faint">-</span>'}</td>
        <td>${c.next_contact_at?`<span style="${late?'color:var(--danger);font-weight:700;':''}">${fmtDateTime(c.next_contact_at)}${late?' (지남)':''}</span>`:'<span class="faint">-</span>'}</td>
        <td><span class="chip">${CHANNELS[c.channel]}</span></td>
        <td>${userName(c.user_id)}</td>
      </tr>`;}).join('')||`<tr><td colspan="7" class="empty">${ic('chat')}<div>해당 상담이 없습니다.</div></td></tr>`}</tbody>
  </table></div></div>`;
}

      <div class="field"><label>고객 요청사항</label><input id="co-request" value="${s?s.customer_request||'':''}" placeholder="희망 일정, 인원 등"></div>
      <div class="form-row">
        <div class="field"><label>다음 할 일</label><input id="co-action" value="${s?s.next_action||'':''}" placeholder="배편 확인, 견적 발송 등"></div>

let _guideOpen=true;
function fmtDur(s){ if(s==null||isNaN(s)) return '-'; s=Math.round(s); const m=Math.floor(s/60), ss=s%60; return m+':'+String(ss).padStart(2,'0'); }
function fmtKB(b){ if(!b) return ''; return b>=1048576?(b/1048576).toFixed(1)+'MB':Math.max(1,Math.round(b/1024))+'KB'; }
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    <div class="modal-body">

        <textarea id="rc-transcript" rows="5" placeholder="음성→텍스트 변환 결과를 붙여넣으세요">${escHtml(s?s.transcript||'':'')}</textarea>
        <button type="button" class="btn btn-sm" style="margin-top:8px;" onclick="extractSummary()">${ic('spark','ic')} 스크립트 → 요약 초안</button>

      <div class="field"><label>통화 요약 <span class="req">*</span></label><textarea id="rc-summary" rows="3" placeholder="핵심 요약을 입력하거나 위 버튼으로 초안 생성">${escHtml(s?s.content||'':'')}</textarea></div>
      <div class="form-row">
        <div class="field"><label>주요 요청사항</label><input id="rc-request" value="${escHtml(s?s.customer_request||'':'')}"></div>
        <div class="field"><label>다음 할 일</label><input id="rc-action" value="${escHtml(s?s.next_action||'':'')}"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>상담상태</label><select id="rc-status">${Object.entries(CONSULT_STATUS).map(([k,v])=>`<option value="${k}" ${(s?s.status:'in_progress')===k?'selected':''}>${v}</option>`).join('')}</select></div>
        <div class="field"><label>다음 연락일</label><input id="rc-next" type="datetime-local" value="${s&&s.next_contact_at?s.next_contact_at.slice(0,16):''}"></div>

function onRecFile(input){
  const f=input.files&&input.files[0]; if(!f) return;
  document.getElementById('rc-fname').value=f.name;
  document.getElementById('rc-fsize').value=f.size;
  const info=document.getElementById('rc-fileinfo');
  info.textContent='파일: '+f.name+' · 길이 확인 중…';
  _recSess[f.name]=URL.createObjectURL(f);
  const au=new Audio(); au.preload='metadata';
  au.onloadedmetadata=()=>{ const d=Math.round(au.duration); const de=document.getElementById('rc-dur'); if(de&&!de.value) de.value=fmtDur(d); info.textContent='파일: '+f.name+' · '+fmtDur(d)+' ('+fmtKB(f.size)+') · 이 세션에서 재생 가능'; };
  au.onerror=()=>{ info.textContent='파일: '+f.name+' ('+fmtKB(f.size)+') — 길이를 못 읽었습니다. 통화시간을 직접 입력하세요.'; };
  au.src=_recSess[f.name];
}
function extractSummary(){
  const t=(document.getElementById('rc-transcript').value||'').trim();
  if(!t){ toast('먼저 스크립트를 붙여넣으세요','err'); return; }
  const kw=/(희망|출발|귀가|도착|인원|명|성인|소아|유아|숙소|호텔|펜션|리조트|민박|견적|금액|예산|만원|예약|예약금|잔금|배편|후포|포항|묵호|강릉|독도|성인봉|투어|차량|렌터카|선적|날짜|월|일|캠핑|낚시|일정)/;
  const clean=t.replace(/^\s*(상담원|상담사|직원|고객|손님|여보세요)\s*[:：]?\s*/gm,'');
  const sents=clean.split(/[\n.!?。]+/).map(x=>x.trim()).filter(x=>x.length>=6);
  const picked=[]; for(const s of sents){ if(kw.test(s)&&!picked.includes(s)){ picked.push(s); } if(picked.length>=5) break; }
  const draft=(picked.length?picked:sents.slice(0,3)).map(s=>'· '+s).join('\n');
  const sm=document.getElementById('rc-summary'); sm.value=draft; sm.focus();
  toast('핵심 문장을 추출했습니다. 확인 후 다듬어 주세요','ok');
}
function saveRecord(id){
  const cust=document.getElementById('rc-cust').value;
  const summary=document.getElementById('rc-summary').value.trim();
  if(!summary){ toast('통화 요약을 입력하세요','err'); return; }
  let dr=(document.getElementById('rc-dur').value||'').trim(), dur=null;
  if(dr){ if(dr.includes(':')){ const p=dr.split(':').map(Number); dur=(p[0]||0)*60+(p[1]||0); } else dur=parseInt(dr,10)||null; }
  const data={ channel:'phone', status:document.getElementById('rc-status').value, content:summary,
    transcript:document.getElementById('rc-transcript').value.trim(),
    customer_request:document.getElementById('rc-request').value.trim(), next_action:document.getElementById('rc-action').value.trim(),
    next_contact_at:document.getElementById('rc-next').value||null, call_at:document.getElementById('rc-callat').value||nowISO(),
    recording:{ filename:document.getElementById('rc-fname').value||'(파일 미첨부)', duration:dur, size:parseInt(document.getElementById('rc-fsize').value,10)||null } };
  if(id){ const s=byId(DB.consultations,id); Object.assign(s,data,{updated_at:nowISO()}); toast('녹취 상담이 수정되었습니다','ok'); }
  else{ DB.consultations.unshift({id:uid(),customer_id:cust,user_id:session().id,priority:'normal',...data,created_at:nowISO()}); toast('녹취 상담이 등록되었습니다','ok'); }
  saveDB(); closeModal(); render();
}
function openRecordDetail(id){
  const s=byId(DB.consultations,id); const rec=s.recording||{}; const url=_recSess[rec.filename];
  openModal(`
    <div class="modal-head"><h3>녹취 상담 · ${custName(s.customer_id)}</h3><button class="x" onclick="closeModal()">×</button></div>

      ${url?`<audio controls src="${url}" style="width:100%;margin:10px 0;"></audio>`:`<div class="muted" style="font-size:12px;margin:8px 0;background:var(--surface-soft);padding:8px 10px;border-radius:8px;">※ 원본 파일은 브라우저에 저장되지 않습니다. 이 세션에서 파일을 다시 첨부하면 재생됩니다.</div>`}
      <div style="margin-top:12px;"><div class="k" style="font-size:12px;color:var(--faint);margin-bottom:4px;">통화 요약</div><div style="background:var(--surface-soft);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13.5px;line-height:1.7;">${escHtml(s.content||'-').replace(/\n/g,'<br>')}</div></div>
      ${s.transcript?`<div style="margin-top:12px;"><div class="k" style="font-size:12px;color:var(--faint);margin-bottom:4px;">전체 스크립트</div><div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.7;max-height:220px;overflow:auto;white-space:pre-wrap;">${escHtml(s.transcript)}</div></div>`:''}
      ${s.customer_request?`<div class="kv" style="margin-top:12px;"><div class="k">주요 요청</div><div class="v">${escHtml(s.customer_request)}</div></div>`:''}
      ${s.next_action?`<div class="kv"><div class="k">다음 할 일</div><div class="v">${escHtml(s.next_action)}</div></div>`:''}
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" style="margin-right:auto" onclick="nav('#/customers/${s.customer_id}');closeModal()">고객 상세로</button><button class="btn" onclick="closeModal()">닫기</button><button class="btn btn-primary" onclick="openRecordModal('${id}')">수정</button></div>`);
}

    _builder={ id:null, customer_id:custId, user_id:session().id, status:'draft',
      travel_start_date:addDays(todayISO(),7), travel_end_date:addDays(todayISO(),9),
      adults:2, children:0, infants:0, valid_until:addDays(todayISO(),7), public_note:'', internal_note:'',
      items:[{id:uid(),item_type:'ferry',item_name:'왕복 배편',quantity:2,sale_price:100000,cost_price:84000},
             {id:uid(),item_type:'lodging',item_name:'숙박 2박',quantity:1,sale_price:225000,cost_price:180000}] };
  }
  drawBuilder(el);
}
function drawBuilder(el){

  let sale=0,cost=0; b.items.forEach(i=>{ sale+=(i.sale_price||0)*(i.quantity||1); cost+=(i.cost_price||0)*(i.quantity||1); });

  <a class="btn btn-sm btn-ghost" href="#/quotes" style="margin-bottom:12px;">${ic('back','ic')} 견적목록</a>
  <div class="page-head"><div><h1>${b.id?'견적 수정':'견적 작성'}</h1><div class="sub">${b.id?byId(DB.quotes,b.id).quote_number:'신규 견적'} · ${cust?cust.name:''}</div></div></div>
  <div class="builder">
    <div>

        <div class="form-row">
          <div class="field"><label>고객</label><select onchange="_builder.customer_id=this.value">${DB.customers.map(c=>`<option value="${c.id}" ${b.customer_id===c.id?'selected':''}>${c.name} (${c.phone})</option>`).join('')}</select></div>
          <div class="field"><label>견적 유효기간</label><input type="date" value="${b.valid_until?b.valid_until.slice(0,10):''}" onchange="_builder.valid_until=this.value"></div>
        </div>
        <div class="form-row">
          <div class="field"><label>출발일</label><input type="date" value="${b.travel_start_date}" onchange="_builder.travel_start_date=this.value"></div>
          <div class="field"><label>귀가일</label><input type="date" value="${b.travel_end_date}" onchange="_builder.travel_end_date=this.value"></div>
        </div>
        <div class="form-row-3">
          <div class="field"><label>성인</label><input type="number" min="0" value="${b.adults}" onchange="_builder.adults=+this.value;recalcBuilder()"></div>
          <div class="field"><label>소아</label><input type="number" min="0" value="${b.children}" onchange="_builder.children=+this.value;recalcBuilder()"></div>
          <div class="field"><label>유아</label><input type="number" min="0" value="${b.infants}" onchange="_builder.infants=+this.value;recalcBuilder()"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><h3>견적 항목</h3>
          <div style="display:flex;gap:6px;"><button class="btn btn-sm" onclick="loadProduct()">${ic('box','ic')} 상품 불러오기</button><button class="btn btn-sm btn-primary" onclick="addItem()">${ic('plus','ic')} 항목추가</button></div>
        </div>
        <div class="card-pad">
          <div class="item-row" style="font-size:11px;color:var(--muted);font-weight:700;border-bottom:2px solid var(--border);padding-bottom:6px;">
            <div>유형</div><div>항목명</div><div>수량</div><div style="text-align:right;">판매단가</div><div style="text-align:right;">원가단가</div><div></div>
          </div>
          <div id="item-list">${b.items.map((it,idx)=>itemRowHtml(it,idx)).join('')}</div>
          <div style="margin-top:10px;font-size:12px;color:var(--faint);">할인은 판매단가를 음수로 입력하세요. 내부 원가는 고객 미리보기에서 숨겨집니다.</div>
        </div>
      </div>
      <div class="card card-pad mt16">
        <div class="field"><label>고객용 안내 문구 (미리보기에 표시)</label><textarea onchange="_builder.public_note=this.value" placeholder="포함/불포함 사항, 안내사항">${b.public_note||''}</textarea></div>
        <div class="field mb0"><label>내부 메모 (고객 미표시)</label><input value="${(b.internal_note||'').replace(/"/g,'&quot;')}" onchange="_builder.internal_note=this.value" placeholder="협의 사항 등"></div>
      </div>
    </div>
    <div class="summary-panel">
      <div class="card card-pad">
        <h3 style="font-size:15px;margin-bottom:12px;">견적 요약</h3>
        <div class="sum-row"><span>총 판매가</span><b>${money(sale)}원</b></div>
        <div class="sum-row"><span class="muted">총 원가</span><span class="muted">${money(cost)}원</span></div>
        <div class="sum-row total"><span>예상 이익</span><span class="pos">${money(profit)}원</span></div>
        <div class="sum-row" style="border:none;padding-top:2px;"><span class="muted">마진율</span><b style="color:var(--blue);">${margin.toFixed(1)}%</b></div>
        <div class="divider"></div>
        <div class="sum-row" style="border:none;"><span class="muted" style="font-size:12.5px;">인원 ${cnt}명 · 1인 평균</span><span class="muted" style="font-size:12.5px;">${money(cnt?sale/cnt:0)}원</span></div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:14px;">

            <button class="btn" style="flex:1;" onclick="saveQuote(true)">미리보기</button>
            <button class="btn" style="flex:1;" onclick="saveQuote(false,true)">${ic('message','ic')} 문자발송</button>
          </div>

}
function itemRowHtml(it,idx){
  return `<div class="item-row" data-idx="${idx}">
    <select onchange="_builder.items[${idx}].item_type=this.value">${Object.entries(ITEM_TYPES).map(([k,v])=>`<option value="${k}" ${it.item_type===k?'selected':''}>${v}</option>`).join('')}</select>
    <input value="${(it.item_name||'').replace(/"/g,'&quot;')}" placeholder="항목명" onchange="_builder.items[${idx}].item_name=this.value">
    <input type="number" class="input-money" value="${it.quantity||1}" onchange="_builder.items[${idx}].quantity=+this.value;recalcBuilder()">
    <input type="number" class="input-money" value="${it.sale_price||0}" onchange="_builder.items[${idx}].sale_price=+this.value;recalcBuilder()">
    <input type="number" class="input-money" value="${it.cost_price||0}" onchange="_builder.items[${idx}].cost_price=+this.value;recalcBuilder()">
    <button class="del" onclick="delItem(${idx})">×</button>
  </div>`;
}
function addItem(){ _builder.items.push({id:uid(),item_type:'tour',item_name:'',quantity:1,sale_price:0,cost_price:0}); drawBuilder(document.getElementById('content')); }
function delItem(idx){ _builder.items.splice(idx,1); drawBuilder(document.getElementById('content')); }
function recalcBuilder(){ drawBuilder(document.getElementById('content')); }
function loadProduct(){
  openModal(`<div class="modal-head"><h3>상품 불러오기</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">${DB.products.filter(p=>p.is_active).map(p=>`<div class="card card-pad" style="margin-bottom:10px;cursor:pointer;" onclick="applyProduct('${p.id}')">
      <div class="between"><b>${p.name}</b><span class="chip">${p.duration_nights}박${p.duration_days}일</span></div>
      <div class="muted" style="font-size:12.5px;margin-top:4px;">기본가 ${won(p.base_price)} · ${DB.product_items.filter(i=>i.product_id===p.id).length}개 항목</div></div>`).join('')||'<div class="empty">등록된 상품이 없습니다.</div>'}</div>`);
}
function applyProduct(pid){
  const items=DB.product_items.filter(i=>i.product_id===pid).sort((a,b)=>a.sort_order-b.sort_order);
  const n=_builder.adults+_builder.children+_builder.infants||1;
  items.forEach(pi=>_builder.items.push({id:uid(),item_type:pi.item_type,item_name:pi.item_name,quantity:(pi.item_type==='ferry'||pi.item_type==='tour')?n:1,sale_price:pi.default_sale_price,cost_price:pi.default_cost_price}));
  const p=byId(DB.products,pid); if(p&&!_builder.public_note) _builder.public_note='포함: '+p.included_text+'\n불포함: '+p.excluded_text;
  closeModal(); drawBuilder(document.getElementById('content')); toast('상품 항목을 불러왔습니다','ok');
}
function saveQuote(preview,sendSms){
  const b=_builder;
  if(!b.items.length){ toast('견적 항목을 1개 이상 추가하세요','err'); return; }
  let sale=0,cost=0; b.items.forEach(i=>{ sale+=(i.sale_price||0)*(i.quantity||1); cost+=(i.cost_price||0)*(i.quantity||1); });
  const profit=sale-cost, margin=sale?(profit/sale*100):0; const dep=Math.round(sale*0.2/10000)*10000;
  let q;
  if(b.id){ q=byId(DB.quotes,b.id); Object.assign(q,{customer_id:b.customer_id,travel_start_date:b.travel_start_date,travel_end_date:b.travel_end_date,adults:b.adults,children:b.children,infants:b.infants,total_price:sale,total_cost:cost,profit,margin_rate:+margin.toFixed(1),deposit_amount:dep,balance_amount:sale-dep,valid_until:b.valid_until,public_note:b.public_note,internal_note:b.internal_note,updated_at:nowISO()});
    DB.quote_items=DB.quote_items.filter(i=>i.quote_id!==b.id);
  } else {
    q={id:uid(),quote_number:quoteNumber(),customer_id:b.customer_id,user_id:session().id,status:'draft',travel_start_date:b.travel_start_date,travel_end_date:b.travel_end_date,adults:b.adults,children:b.children,infants:b.infants,total_price:sale,total_cost:cost,profit,margin_rate:+margin.toFixed(1),deposit_amount:dep,balance_amount:sale-dep,valid_until:b.valid_until,public_note:b.public_note,internal_note:b.internal_note,created_at:nowISO(),updated_at:nowISO()};
    DB.quotes.unshift(q); b.id=q.id;
  }
  b.items.forEach((it,idx)=>DB.quote_items.push({id:it.id||uid(),quote_id:q.id,item_type:it.item_type,item_name:it.item_name,quantity:it.quantity||1,sale_price:it.sale_price||0,cost_price:it.cost_price||0,sort_order:idx+1,memo:it.memo||''}));
  saveDB();
  if(preview){ window.open('#/preview/'+q.id,'_blank'); toast('견적이 저장되었습니다','ok'); return; }
  if(sendSms){ q.status='sent'; saveDB(); openSmsModal(q.customer_id,null,'quote',q.id); return; }
  toast('견적이 저장되었습니다','ok'); nav('#/quotes/'+q.id);
}
function convertToReservation(quoteId){
  const q=byId(DB.quotes,quoteId);
  confirmDialog('예약 전환','이 견적을 예약으로 전환하고 <b>예약금요청</b> 상태로 생성합니다. 진행할까요?',()=>{
    const items=DB.quote_items.filter(i=>i.quote_id===quoteId);
    const r={id:uid(),reservation_number:resNumber(),customer_id:q.customer_id,quote_id:quoteId,user_id:session().id,status:'deposit_requested',
      travel_start_date:q.travel_start_date,travel_end_date:q.travel_end_date,adults:q.adults,children:q.children,infants:q.infants,
      total_price:q.total_price,total_cost:q.total_cost,profit:q.profit,memo:'견적 '+q.quote_number+' 전환',created_at:nowISO(),updated_at:nowISO()};
    DB.reservations.unshift(r);
    items.forEach(it=>{
      if(it.item_type==='ferry') DB.reservation_ferries.push({id:uid(),reservation_id:r.id,direction:'outbound',departure_port:'',arrival_port:'울릉',ferry_company:'',ferry_name:it.item_name,departure_at:q.travel_start_date+'T09:00',arrival_at:q.travel_start_date+'T12:00',seat_type:'',status:'checking',sale_price:it.sale_price*it.quantity,cost_price:it.cost_price*it.quantity,memo:it.memo});
      else if(it.item_type==='lodging') DB.reservation_lodgings.push({id:uid(),reservation_id:r.id,lodging_name:it.item_name,room_type:'',room_count:it.quantity,checkin_date:q.travel_start_date,checkout_date:q.travel_end_date,breakfast_included:false,status:'checking',sale_price:it.sale_price*it.quantity,cost_price:it.cost_price*it.quantity,memo:it.memo});
      else if(it.item_type==='tour') DB.reservation_tours.push({id:uid(),reservation_id:r.id,tour_name:it.item_name,tour_date:q.travel_start_date,tour_time:'',people_count:it.quantity,status:'checking',sale_price:it.sale_price*it.quantity,cost_price:it.cost_price*it.quantity,memo:it.memo});
    });
    const c=custById(q.customer_id);
    DB.travelers.push({id:uid(),reservation_id:r.id,name:c.name,gender:'unknown',birth_date:c.birth_date||'',phone:c.phone,traveler_type:'adult',is_representative:true,memo:''});
    q.status='converted'; logChange('reservations',r.id,'create','',r.reservation_number,'견적 전환');
    saveDB(); closeModal(); toast('예약으로 전환되었습니다','ok'); nav('#/reservations/'+r.id);
  },'예약 생성','btn-teal');
}

      </div>

<script>
/* ============================================================
   예약관리: 목록
   ============================================================ */
let _resFilter='all';
const RES_FILTERS=[
  ['all','전체',()=>true],
  ['quote_sent','견적발송',r=>['quote_sent','review'].includes(r.status)],
  ['deposit','예약금',r=>['deposit_requested','deposit_paid'].includes(r.status)],
  ['confirmed','예약확정',r=>r.status==='confirmed'],
  ['balance_requested','잔금요청',r=>r.status==='balance_requested'],
  ['ready','출발대기',r=>['ready','traveling','paid'].includes(r.status)],
  ['completed','여행완료',r=>r.status==='completed'],
  ['disruption','결항/변경',r=>['disruption','changed'].includes(r.status)],
  ['cancelled','취소/환불',r=>['cancelled','refunding','refunded'].includes(r.status)],
];
let _resQ='';
function resFilteredList(){
  const fdef=RES_FILTERS.find(f=>f[0]===_resFilter)||RES_FILTERS[0];
  let list=DB.reservations.filter(fdef[2]);
  if(_resQ){ const q=_resQ.toLowerCase(); list=list.filter(r=>r.reservation_number.toLowerCase().includes(q)||custName(r.customer_id).includes(_resQ)); }
  return list.sort((a,b)=>a.travel_start_date.localeCompare(b.travel_start_date));
}
function resTableCard(list){
  return `<div class="card"><div class="tbl-wrap"><table class="tbl">
    <thead><tr><th>예약번호</th><th>고객명</th><th>출발일</th><th>인원</th><th>상태</th><th>배편</th><th>숙박</th><th class="num">미수금</th><th>담당자</th></tr></thead>
    <tbody>${list.map(r=>{ const d=daysUntil(r.travel_start_date); const bal=resBalance(r);
      const fer=DB.reservation_ferries.filter(x=>x.reservation_id===r.id); const lod=DB.reservation_lodgings.filter(x=>x.reservation_id===r.id);
      const ferOk=fer.length&&fer.every(x=>x.status==='confirmed'); const lodOk=lod.length&&lod.every(x=>x.status==='confirmed');
      return `<tr class="clickable" onclick="nav('#/reservations/${r.id}')">
        <td class="name-cell">${r.reservation_number}</td><td>${custName(r.customer_id)}</td>
        <td>${fmtDate(r.travel_start_date)} ${d!=null&&d>=0&&d<=7&&!['completed','cancelled'].includes(r.status)?`<span class="badge b-purple" style="height:18px;">D-${d}</span>`:''}</td>
        <td>${r.adults+r.children+r.infants}명</td><td>${resBadge(r.status)}</td>
        <td>${fer.length?(ferOk?'<span class="badge b-green">확정</span>':'<span class="badge b-gray">확인중</span>'):'<span class="faint">-</span>'}</td>
        <td>${lod.length?(lodOk?'<span class="badge b-green">확정</span>':'<span class="badge b-gray">확인중</span>'):'<span class="faint">-</span>'}</td>
        <td class="num" style="color:${bal>0?'var(--danger)':'var(--success)'};font-weight:${bal>0?700:400};">${money(bal)}</td>
        <td>${userName(r.user_id)}</td>
      </tr>`;}).join('')||`<tr><td colspan="9" class="empty">${ic('calendar')}<div>해당 예약이 없습니다.</div></td></tr>`}</tbody>
  </table></div></div>`;
}
function resSearch(val){
  _resQ=val;
  const list=resFilteredList();
  const t=document.getElementById('res-tbl'); if(t) t.innerHTML=resTableCard(list);
  const n=document.getElementById('res-cnt'); if(n) n.textContent=list.length;
}
function renderReservations(el){
  const list=resFilteredList();
  el.innerHTML=`
  <div class="page-head">
    <div><h1>예약관리</h1><div class="sub">전체 ${DB.reservations.length}건 · 표시 <span id="res-cnt">${list.length}</span>건</div></div>
    <div class="actions">
      <div style="position:relative;">${ic('search','si')}<input style="height:38px;border:1px solid var(--border);border-radius:9px;width:240px;padding:0 12px 0 38px;" placeholder="예약번호·고객명 검색" value="${_resQ}" oninput="resSearch(this.value)"></div>
      <a class="btn" href="#/sms">${ic('message','ic')} 문자관리</a>
    </div>
  </div>
  <div class="filter-tabs">${RES_FILTERS.map(f=>`<div class="filter-tab ${_resFilter===f[0]?'active':''}" onclick="_resFilter='${f[0]}';renderReservations(document.getElementById('content'))">${f[1]}<span class="cnt">${DB.reservations.filter(f[2]).length}</span></div>`).join('')}</div>
  <div id="res-tbl">${resTableCard(list)}</div>`;
}

/* ============================================================
   예약 상세 (9 탭)
   ============================================================ */
let _resTab='basic';
function renderReservationDetail(el,id){
  const r=resById(id); if(!r){ el.innerHTML='<div class="empty">예약을 찾을 수 없습니다.</div>'; return; }
